<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Cyber Cloth Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #050914;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="clothCanvas"></canvas>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const canvas = document.getElementById('clothCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const physicsAccuracy = 4;
        const gravity = 0.16;
        const tearDistance = 42;

        let numCols = 30;
        let numRows = 20;
        let restDistance = 10;

        if (width < 500) {
            numCols = 22;
            numRows = 16;
            restDistance = Math.floor((width * 0.82) / (numCols - 1));
        } else {
            restDistance = 14;
        }

        let startX = (width - (numCols - 1) * restDistance) / 2;
        let startY = height * 0.15;

        let points = [];
        let constraints = [];
        let sparks = [];

        class Point {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.px = x;
                this.py = y;
                this.vx = 0;
                this.vy = 0;
                this.pinX = null;
                this.pinY = null;
            }

            update() {
                if (this.pinX !== null && this.pinY !== null) return;

                this.vx = (this.x - this.px) * 0.98;
                this.vy = (this.y - this.py) * 0.98;

                this.px = this.x;
                this.py = this.y;

                this.x += this.vx;
                this.y += this.vy + gravity;
            }

            pin(px, py) {
                this.pinX = px;
                this.pinY = py;
            }

            resolve() {
                if (this.pinX !== null && this.pinY !== null) {
                    this.x = this.pinX;
                    this.y = this.pinY;
                }
            }
        }

        class Constraint {
            constructor(p1, p2) {
                this.p1 = p1;
                this.p2 = p2;
                this.length = restDistance;
                this.isTorn = false;
                this.stress = 0;
            }

            resolve() {
                if (this.isTorn) return;

                const dx = this.p2.x - this.p1.x;
                const dy = this.p2.y - this.p1.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                this.stress = (dist - this.length) / (tearDistance - this.length);
                if (this.stress < 0) this.stress = 0;

                if (dist > tearDistance) {
                    this.isTorn = true;
                    createSparkExplosion((this.p1.x + this.p2.x) / 2, (this.p1.y + this.p2.y) / 2);
                    return;
                }

                const diff = (this.length - dist) / dist * 0.5;
                const offsetX = dx * diff;
                const offsetY = dy * diff;

                if (this.p1.pinX === null) {
                    this.p1.x -= offsetX;
                    this.p1.y -= offsetY;
                }
                if (this.p2.pinX === null) {
                    this.p2.x += offsetX;
                    this.p2.y += offsetY;
                }
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 4 - 1;
                this.alpha = 1;
                this.hue = Math.random() > 0.5 ? 340 : 190; 
                this.size = Math.random() * 2 + 1.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.12; 
                this.alpha -= 0.03;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
                ctx.shadowBlur = 6;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 65%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createSparkExplosion(x, y) {
            for (let i = 0; i < 4; i++) {
                sparks.push(new Spark(x, y));
            }
        }

        function initCloth() {
            points = [];
            constraints = [];
            sparks = [];
            const matrix = [];

            for (let y = 0; y < numRows; y++) {
                matrix[y] = [];
                for (let x = 0; x < numCols; x++) {
                    const p = new Point(startX + x * restDistance, startY + y * restDistance);
                    if (y === 0 && x % 2 === 0) {
                        p.pin(p.x, p.y);
                    }
                    points.push(p);
                    matrix[y][x] = p;
                }
            }

            for (let y = 0; y < numRows; y++) {
                for (let x = 0; x < numCols; x++) {
                    if (x < numCols - 1) {
                        constraints.push(new Constraint(matrix[y][x], matrix[y][x + 1]));
                    }
                    if (y < numRows - 1) {
                        constraints.push(new Constraint(matrix[y][x], matrix[y + 1][x]));
                    }
                }
            }
        }

        let mouse = { x: 0, y: 0, px: 0, py: 0, isDown: false };

        function checkLineIntersection(p1, p2) {
            const x1 = mouse.px, y1 = mouse.py;
            const x2 = mouse.x,  y2 = mouse.y;
            const x3 = p1.x,     y3 = p1.y;
            const x4 = p2.x,     y4 = p2.y;

            const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
            if (den === 0) return false;

            const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / den;
            const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / den;

            return (t >= 0 && t <= 1 && u >= 0 && u <= 1);
        }

        function updatePhysics() {
            points.forEach(p => p.update());

            for (let i = 0; i < physicsAccuracy; i++) {
                constraints.forEach(c => {
                    c.resolve();
                    if (mouse.isDown && !c.isTorn) {
                        if (checkLineIntersection(c.p1, c.p2)) {
                            c.isTorn = true;
                            createSparkExplosion((c.p1.x + c.p2.x) / 2, (c.p1.y + c.p2.y) / 2);
                        }
                    }
                });
