<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Cloth Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="clothCanvas"></canvas>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const canvas = document.getElementById('clothCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const physicsAccuracy = 3; 
        const gravity = 0.15;
        const tearDistance = 40;

        let numCols = 26;
        let numRows = 18;
        let restDistance = 12;

        if (width < 500) {
            numCols = 20;
            numRows = 15;
            restDistance = Math.floor((width * 0.8) / (numCols - 1));
        }

        let startX = (width - (numCols - 1) * restDistance) / 2;
        let startY = height * 0.15;

        let points = [];
        let constraints = [];
        let sparks = [];

        class Point {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.px = x;
                this.py = y;
                this.vx = 0;
                this.vy = 0;
                this.pinX = null;
                this.pinY = null;
            }

            update() {
                if (this.pinX !== null && this.pinY !== null) return;

                this.vx = (this.x - this.px) * 0.98;
                this.vy = (this.y - this.py) * 0.98;

                this.px = this.x;
                this.py = this.y;

                this.x += this.vx;
                this.y += this.vy + gravity;
            }

            pin(px, py) {
                this.pinX = px;
                this.pinY = py;
            }

            resolve() {
                if (this.pinX !== null && this.pinY !== null) {
                    this.x = this.pinX;
                    this.y = this.pinY;
                }
            }
        }

        class Constraint {
            constructor(p1, p2) {
                this.p1 = p1;
                this.p2 = p2;
                this.length = restDistance;
                this.isTorn = false;
            }

            resolve() {
                if (this.isTorn) return;

                const dx = this.p2.x - this.p1.x;
                const dy = this.p2.y - this.p1.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > tearDistance) {
                    this.isTorn = true;
                    createSparkExplosion((this.p1.x + this.p2.x) / 2, (this.p1.y + this.p2.y) / 2);
                    return;
                }

                const diff = (this.length - dist) / dist * 0.5;
                const offsetX = dx * diff;
                const offsetY = dy * diff;

                if (this.p1.pinX === null) {
                    this.p1.x -= offsetX;
                    this.p1.y -= offsetY;
                }
                if (this.p2.pinX === null) {
                    this.p2.x += offsetX;
                    this.p2.y += offsetY;
                }
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 4 - 1;
                this.alpha = 1;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.alpha -= 0.05;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function createSparkExplosion(x, y) {
            for (let i = 0; i < 4; i++) {
                sparks.push(new Spark(x, y));
            }
        }
