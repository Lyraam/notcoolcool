<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Cloth Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="clothCanvas"></canvas>

    <script>
        window.addEventListener('scroll', e => e.preventDefault(), { passive: false });

        const canvas = document.getElementById('clothCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const gravity = 0.15;
        const tearDistance = 40;
        const physicsAccuracy = 3; 

        let numCols = 20;
        let numRows = 15;
        let restDistance = 14;

        if (width < 500) {
            numCols = 18;
            numRows = 14;
            restDistance = Math.floor((width * 0.8) / (numCols - 1));
        }

        let startX = (width - (numCols - 1) * restDistance) / 2;
        let startY = height * 0.15;

        let points = [];
        let constraints = [];

        class Point {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.px = x;
                this.py = y;
                this.pinX = null;
                this.pinY = null;
            }

            update() {
                if (this.pinX !== null && this.pinY !== null) return;

                let vx = (this.x - this.px) * 0.98;
                let vy = (this.y - this.py) * 0.98;

                this.px = this.x;
                this.py = this.y;

                this.x += vx;
                this.y += vy + gravity;
            }

            pin(px, py) {
                this.pinX = px;
                this.pinY = py;
            }

            resolve() {
                if (this.pinX !== null && this.pinY !== null) {
                    this.x = this.pinX;
                    this.y = this.pinY;
                }
            }
        }

        class Constraint {
            constructor(p1, p2) {
                this.p1 = p1;
                this.p2 = p2;
                this.isTorn = false;
                this.flashFrames = 0;
            }

            resolve() {
                if (this.isTorn) return;

                let dx = this.p2.x - this.p1.x;
                let dy = this.p2.y - this.p1.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > tearDistance) {
                    this.isTorn = true;
                    this.flashFrames = 3;
                    return;
                }

                let diff = (restDistance - dist) / dist * 0.5;
                let offsetX = dx * diff;
                let offsetY = dy * diff;

                if (this.p1.pinX === null) {
                    this.p1.x -= offsetX;
                    this.p1.y -= offsetY;
                }
                if (this.p2.pinX === null) {
                    this.p2.x += offsetX;
                    this.p2.y += offsetY;
                }
            }
        }

        function initCloth() {
            points = [];
            constraints = [];
            let matrix = [];

            for (let y = 0; y < numRows; y++) {
                matrix[y] = [];
                for (let x = 0; x < numCols; x++) {
                    let p = new Point(startX + x * restDistance, startY + y * restDistance);
                    if (y === 0 && x % 2 === 0) {
                        p.pin(p.x, p.y);
                    }
                    points.push(p);
                    matrix[y][x] = p;
                }
            }

            for (let y = 0; y < numRows; y++) {
                for (let x = 0; x < numCols; x++) {
                    if (x < numCols - 1) {
                        constraints.push(new Constraint(matrix[y][x], matrix[y][x + 1]));
                    }
                    if (y < numRows - 1) {
                        constraints.push(new Constraint(matrix[y][x], matrix[y + 1][x]));
                    }
                }
            }
        }

        let mouse = { x: 0, y: 0, isDown: false };

        function checkCut(c) {
            let midX = (c.p1.x + c.p2.x) / 2;
            let midY = (c.p1.y + c.p2.y) / 2;
            let dx = mouse.x - midX;
            let dy = mouse.y - midY;
            return (Math.sqrt(dx * dx + dy * dy) < 24); 
        }

        function updatePhysics() {
            points.forEach(p => p.update());

            for (let i = 0; i < physicsAccuracy; i++) {
                constraints.forEach(c => {
                    c.resolve();
                    if (mouse.isDown && !c.isTorn && checkCut(c)) {
                        c.isTorn = true;
                        c.flashFrames = 3;
                    }
                });
                points.forEach(p => p.resolve());
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = 'rgba(0, 195, 255, 0.8)';
            ctx.lineWidth = 1.8;
            ctx.beginPath();

            constraints.forEach(c => {
                if (!c.isTorn) {
                    ctx.moveTo(c.p1.x, c.p1.y);
                    ctx.lineTo(c.p2.x, c.p2.y);
                }
            });
            ctx.stroke();

            constraints.forEach(c => {
                if (c.isTorn && c.flashFrames > 0) {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(255, 255, 255, ' + (c.flashFrames / 3) + ')';
                    ctx.lineWidth = 6.0;
                    ctx.moveTo(c.p1.x, c.p1.y);
                    ctx.lineTo(c.p2.x, c.p2.y);
                    ctx.stroke();
                    c.flashFrames--;
                }
            });
        }

        function loop() {
            updatePhysics();
            draw();
            requestAnimationFrame(loop);
        }

        function setMouse(e) {
            let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            let clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            mouse.x = clientX;
            mouse.y = clientY;
        }

        window.addEventListener('mousedown', (e) => { mouse.isDown = true; setMouse(e); });
        window.addEventListener('mousemove', (e) => { if (mouse.isDown) setMouse(e); });
        window.addEventListener('mouseup', () => mouse.isDown = false);

        window.addEventListener('touchstart', (e) => { mouse.isDown = true; setMouse(e); }, { passive: true });
        window.addEventListener('touchmove', (e) => { if (mouse.isDown) setMouse(e); }, { passive: true });
        window.addEventListener('touchend', () => mouse.isDown = false);

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            startX = (width - (numCols - 1) * restDistance) / 2;
            startY = height * 0.15;
            initCloth();
        });

        initCloth();
        loop();
    </script>

</body>
</html>
