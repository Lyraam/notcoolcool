<html>

    <title>Tearable Cloth 2D Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="clothCanvas"></canvas>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const canvas = document.getElementById('clothCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const physicsAccuracy = 5;
        const gravity = 0.15;
        const tearDistance = 45;

        let numCols = 40;
        let numRows = 24;
        let restDistance = 8;

        if (width < 500) {
            numCols = 25;
            numRows = 18;
            restDistance = Math.floor(width * 0.75 / numCols);
        } else {
            restDistance = Math.floor(400 / numCols);
        }

        let startX = (width - (numCols - 1) * restDistance) / 2;
        let startY = height * 0.12;

        let points = [];

        class Point {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.px = x;
                this.py = y;
                this.vx = 0;
                this.vy = 0;
                this.pinX = null;
                this.pinY = null;
                this.constraints = [];
            }

            update() {
                if (this.pinX !== null && this.pinY !== null) return;

                this.vx = (this.x - this.px) * 0.99;
                this.vy = (this.y - this.py) * 0.99;

                this.px = this.x;
                this.py = this.y;

                this.x += this.vx;
                this.y += this.vy + gravity;
            }

            pin(px, py) {
                this.pinX = px;
                this.pinY = py;
            }

            resolve() {
                if (this.pinX !== null && this.pinY !== null) {
                    this.x = this.pinX;
                    this.y = this.pinY;
                }
            }
        }

        class Constraint {
            constructor(p1, p2) {
                this.p1 = p1;
                this.p2 = p2;
                this.length = restDistance;
                this.isTorn = false;
            }

            resolve() {
                if (this.isTorn) return;

                const dx = this.p2.x - this.p1.x;
                const dy = this.p2.y - this.p1.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > tearDistance) {
                    this.isTorn = true;
                    return;
                }

                const diff = (this.length - dist) / dist * 0.5;
                const offsetX = dx * diff;
                const offsetY = dy * diff;

                if (this.p1.pinX === null) {
                    this.p1.x -= offsetX;
                    this.p1.y -= offsetY;
                }
                if (this.p2.pinX === null) {
                    this.p2.x += offsetX;
                    this.p2.y += offsetY;
                }
            }
        }

        function initCloth() {
            points = [];
            const matrix = [];

            for (let y = 0; y < numRows; y++) {
                matrix[y] = [];
                for (let x = 0; x < numCols; x++) {
                    const p = new Point(startX + x * restDistance, startY + y * restDistance);
                    if (y === 0 && x % 2 === 0) {
                        p.pin(p.x, p.y);
                    }
                    points.push(p);
                    matrix[y][x] = p;
                }
            }

            for (let y = 0; y < numRows; y++) {
                for (let x = 0; x < numCols; x++) {
                    if (x < numCols - 1) {
                        const c = new Constraint(matrix[y][x], matrix[y][x + 1]);
                        matrix[y][x].constraints.push(c);
                    }
                    if (y < numRows - 1) {
                        const c = new Constraint(matrix[y][x], matrix[y + 1][x]);
                        matrix[y][x].constraints.push(c);
                    }
                }
            }
        }
