<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Potion Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b1329;
            background-image: radial-gradient(#1c2541 1px, transparent 1px);
            background-size: 24px 24px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvasContainer {
            position: relative;
            width: 400px;
            height: 400px;
        }

        canvas {
            display: block;
            width: 400px;
            height: 400px;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div id="canvasContainer">
        <canvas id="potionCanvas" width="400" height="400"></canvas>
        <div id="hint">Drag and Shake the Bottle to Mix Magic! ✨</div>
    </div>

    <script>
        const canvas = document.getElementById('potionCanvas');
        const ctx = canvas.getContext('2d');

        const strokeColor = '#1e293b';
        const strokeWidth = 7;
        
        let bottle = {
            x: 200,
            y: 210,
            targetX: 200,
            targetY: 210,
            radius: 110,
            isDragging: false,
            shakeAmount: 0
        };

        let pointer = { speedX: 0, speedY: 0 };

        const SPREAD = 0.25;
        const DAMPING = 0.06;
        const TENSION = 0.025;
        const POINTS_COUNT = 15;
        
        let waterPoints = [];
        let baseLiquidY = 10; 

        for (let i = 0; i < POINTS_COUNT; i++) {
            waterPoints.push({
                x: ((i / (POINTS_COUNT - 1)) * 220) - 110, 
                y: baseLiquidY,
                targetY: baseLiquidY,
                v: 0
            });
        }

        let heart = {
            x: 0,
            y: baseLiquidY,
            vX: 0,
            vY: 0,
            angle: 0,
            angleV: 0,
            size: 26
        };

        let bubbles = [];
        for (let i = 0; i < 8; i++) {
            bubbles.push({
                angle: Math.random() * Math.PI * 2,
                dist: Math.random() * 80,
                size: Math.random() * 5 + 4,
                seed: Math.random() * 100
            });
        }

        function drawHeartShape(cx, cy, size) {
            ctx.beginPath();
            ctx.moveTo(cx, cy + size / 4);
            ctx.bezierCurveTo(cx, cy - size / 2, cx - size, cy - size / 2, cx - size, cy + size / 4);
            ctx.bezierCurveTo(cx - size, cy + size * 0.8, cx, cy + size * 1.1, cx, cy + size * 1.3);
            ctx.bezierCurveTo(cx, cy + size * 1.1, cx + size, cy + size * 0.8, cx + size, cy + size / 4);
            ctx.bezierCurveTo(cx + size, cy - size / 2, cx, cy - size / 2, cx, cy + size / 4);
            ctx.closePath();
        }

        function getWaterHeightAt(localX) {
            let leftPoint = waterPoints[0];
            let rightPoint = waterPoints[POINTS_COUNT - 1];
            if (localX < leftPoint.x) return leftPoint.y;
            if (localX > rightPoint.x) return rightPoint.y;

            for (let i = 0; i < POINTS_COUNT - 1; i++) {
                let p1 = waterPoints[i];
                let p2 = waterPoints[i + 1];
                if (localX >= p1.x && localX <= p2.x) {
                    let ratio = (localX - p1.x) / (p2.x - p1.x);
                    return p1.y + (p2.y - p1.y) * ratio;
                }
            }
            return baseLiquidY;
        }

        function updatePhysics() {
            let prevX = bottle.x;
            let prevY = bottle.y;

            if (bottle.isDragging) {
                bottle.x += (bottle.targetX - bottle.x) * 0.25;
                bottle.y += (bottle.targetY - bottle.y) * 0.25;
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;
                
                let speedStr = Math.sqrt(pointer.speedX * pointer.speedX + pointer.speedY * pointer.speedY);
                if (speedStr > 6) {
                    let impactIndex = Math.floor(Math.random() * POINTS_COUNT);
                    waterPoints[impactIndex].v -= pointer.speedX * 0.6;
                }
            } else {
                let homeX = 200;
                let homeY = 210 + Math.sin(Date.now() * 0.002) * 6;
                bottle.x += (homeX - bottle.x) * 0.12;
                bottle.y += (homeY - bottle.y) * 0.12;
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;
            }

            for (let i = 0; i < POINTS_COUNT; i++) {
                let p = waterPoints[i];
                let force = TENSION * (p.targetY - p.y) - p.v * DAMPING;
                p.v += force;
                p.y += p.v;

                p.v -= pointer.speedX * 0.06 * (p.x / 110);
                p.v += pointer.speedY * 0.02;
            }

            let leftToRight = new Array(POINTS_COUNT).fill(0);
            let rightToLeft = new Array(POINTS_COUNT).fill(0);

            for (let step = 0; step < 6; step++) {
                for (let i = 0; i < POINTS_COUNT; i++) {
                    if (i > 0) {
                        leftToRight[i] = SPREAD * (waterPoints[i].y - waterPoints[i - 1].y);
                        waterPoints[i - 1].v += leftToRight[i];
                    }
                    if (i < POINTS_COUNT - 1) {
                        rightToLeft[i] = SPREAD * (waterPoints[i].y - waterPoints[i + 1].y);
                        waterPoints[i + 1].v += rightToLeft[i];
                    }
                }
                for (let i = 0; i < POINTS_COUNT; i++) {
                    if (i > 0) waterPoints[i - 1].y += leftToRight[i];
                    if (i < POINTS_COUNT - 1) waterPoints[i + 1].y += rightToLeft[i];
                }
            }

            heart.vX += (pointer.speedX * -0.25);
            heart.vX += (0 - heart.x) * 0.04;
            heart.vX *= 0.85;
            heart.x += heart.vX;
            heart.x = Math.max(-80, Math.min(80, heart.x));

            let currentWaterY = getWaterHeightAt(heart.x);
            heart.y += (currentWaterY - heart.y) * 0.25;

            let deltaX = 8;
            let hLeft = getWaterHeightAt(heart.x - deltaX);
            let hRight = getWaterHeightAt(heart.x + deltaX);
            let targetAngle = Math.atan2(hRight - hLeft, deltaX * 2);

            heart.angleV += (targetAngle - heart.angle) * 0.1;
            heart.angleV *= 0.75;
            heart.angle += heart.angleV;
        }

        function drawGame() {
            ctx.clearRect(0, 0, 400, 400);

            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            let neckY = bottle.y - 110 - 8;
            ctx.fillStyle = '#d97706';
            ctx.beginPath();
            ctx.rect(bottle.x - 18, neckY - 16, 36, 18);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.rect(bottle.x - 26, neckY, 52, 12);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#2dd4bf'; 
            ctx.beginPath();
            ctx.moveTo(bottle.x + waterPoints[0].x, bottle.y + waterPoints[0].y);
            
            for (let i = 0; i < POINTS_COUNT - 1; i++) {
                let p1 = waterPoints[i];
                let p2 = waterPoints[i + 1];
                let xc = (p1.x + p2.x) / 2;
                let yc = (p1.y + p2.y) / 2;
                ctx.quadraticCurveTo(bottle.x + p1.x, bottle.y + p1.y, bottle.x + xc, bottle.y + yc);
            }
            
            let lastP = waterPoints[POINTS_COUNT - 1];
            ctx.lineTo(bottle.x + lastP.x, bottle.y + lastP.y);

            let steps = 30;
            for (let i = 0; i <= steps; i++) {
                let angle = (i / steps) * Math.PI; 
                let cx = bottle.x + Math.cos(angle) * 110;
                let cy = bottle.y + Math.sin(angle) * 110;
                ctx.lineTo(cx, cy);
            }
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.beginPath();
            ctx.moveTo(bottle.x + waterPoints[0].x, bottle.y + waterPoints[0].y);
            for (let i = 0; i < POINTS_COUNT - 1; i++) {
                let p1 = waterPoints[i];
                let p2 = waterPoints[i + 1];
                let xc = (p1.x + p2.x) / 2;
                let yc = (p1.y + p2.y) / 2;
                ctx.quadraticCurveTo(bottle.x + p1.x, bottle.y + p1.y, bottle.x + xc, bottle.y + yc);
            }
            ctx.lineTo(bottle.x + lastP.x, bottle.y + lastP.y);
            ctx.stroke();

            bubbles.forEach(b => {
                let offset = Math.sin(Date.now() * 0.002 + b.seed) * 5;
                let bx = bottle.x + Math.cos(b.angle) * (b.dist + offset);
                let by = bottle.y + Math.sin(b.angle) * (b.dist + offset);
                
                let localX = bx - bottle.x;
                let localY = by - bottle.y;
                let waterSurfaceY = getWaterHeightAt(localX);
                let distToCenter = Math.sqrt(localX * localX + localY * localY);

                if (localY > waterSurfaceY + 5 && distToCenter < 100) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(bx, by, b.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            });

            ctx.save();
            ctx.translate(bottle.x + heart.x, bottle.y + heart.y - 4);
            ctx.rotate(heart.angle);
            ctx.fillStyle = '#ff4b72';
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 5;
            drawHeartShape(0, 0, 14);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.beginPath();
            ctx.arc(-3, -2, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.beginPath();
            ctx.arc(bottle.x, bottle.y, 110, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(bottle.x, bottle.y, 96, Math.PI * 1.05, Math.PI * 1.4);
            ctx.stroke();
        }

        function gameLoop() {
            updatePhysics();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function onStart(e) {
            let pos = getPointerPos(e);
            let dx = pos.x - bottle.x;
            let dy = pos.y - bottle.y;
            if (dx*dx + dy*dy < 16000) {
                bottle.isDragging = true;
                bottle.targetX = pos.x;
                bottle.targetY = pos.y;
            }
        }

        function onMove(e) {
            if (!bottle.isDragging) return;
            let pos = getPointerPos(e);
            bottle.targetX = Math.max(110, Math.min(290, pos.x));
            bottle.targetY = Math.max(130, Math.min(290, pos.y));
        }

        function onEnd() {
            bottle.isDragging = false;
        }

        window.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);

        window.addEventListener('touchstart', onStart, { passive: true });
        window.addEventListener('touchmove', onMove, { passive: true });
        window.addEventListener('touchend', onEnd);

        gameLoop();
    </script>

</body>
</html>
