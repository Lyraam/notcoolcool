<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Potion Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b1329;
            background-image: radial-gradient(#1c2541 1px, transparent 1px);
            background-size: 24px 24px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        #hint {
            position: absolute;
            bottom: 30px;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <canvas id="potionCanvas"></canvas>
    <div id="hint">Drag and Shake the Bottle to Mix Magic! ✨</div>

    <script>
        const canvas = document.getElementById('potionCanvas');
        const ctx = canvas.getContext('2d');

        const dpr = window.devicePixelRatio || 1;
        const size = Math.min(window.innerWidth * 0.9, 450);
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        ctx.scale(dpr, dpr);

        const viewSize = size;
        const strokeColor = '#1e293b';
        const strokeWidth = 7;
        
        let bottle = {
            x: viewSize / 2,
            y: viewSize / 2 + 20,
            targetX: viewSize / 2,
            targetY: viewSize / 2 + 20,
            radius: 110,
            isDragging: false,
            shakeAmount: 0
        };

        let pointer = { lastX: viewSize / 2, lastY: viewSize / 2 + 20, speedX: 0, speedY: 0 };

        const SPREAD = 0.25;
        const DAMPING = 0.06;
        const TENSION = 0.025;
        const POINTS_COUNT = 17;
        
        let waterPoints = [];
        let liquidLevelY = 20; 
        let liquidHue = 160;
        let targetHue = 160;

        for (let i = 0; i < POINTS_COUNT; i++) {
            waterPoints.push({
                x: ((i / (POINTS_COUNT - 1)) * bottle.radius * 2) - bottle.radius,
                y: liquidLevelY,
                targetY: liquidLevelY,
                v: 0
            });
        }

        let heart = {
            x: 0,
            y: 0,
            vX: 0,
            vY: 0,
            angle: 0,
            angleV: 0,
            size: 28
        };

        let particles = [];

        function createParticle(x, y, isStar = false) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 3,
                vy: isStar ? (Math.random() - 0.5) * 3 : -Math.random() * 0.6 - 0.2,
                size: Math.random() * 5 + 3,
                alpha: 1,
                life: 1,
                decay: Math.random() * 0.02 + 0.015,
                isStar: isStar,
                rotation: Math.random() * Math.PI,
                rotSpeed: (Math.random() - 0.5) * 0.1
            });
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, fillStyle) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.save();
            ctx.fillStyle = fillStyle;
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function drawHeartShape(x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y + size / 4);
            ctx.bezierCurveTo(x - size, y + size * 0.8, x, y + size * 1.1, x, y + size * 1.3);
            ctx.bezierCurveTo(x, y + size * 1.1, x + size, y + size * 0.8, x + size, y + size / 4);
            ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y + size / 4);
            ctx.closePath();
        }

        function getWaterHeightAt(localX) {
            let leftPoint = waterPoints[0];
            let rightPoint = waterPoints[POINTS_COUNT - 1];
            if (localX < leftPoint.x) return leftPoint.y;
            if (localX > rightPoint.x) return rightPoint.y;

            for (let i = 0; i < POINTS_COUNT - 1; i++) {
                let p1 = waterPoints[i];
                let p2 = waterPoints[i + 1];
                if (localX >= p1.x && localX <= p2.x) {
                    let ratio = (localX - p1.x) / (p2.x - p1.x);
                    return p1.y + (p2.y - p1.y) * ratio;
                }
            }
            return liquidLevelY;
        }

        function updatePhysics() {
            if (bottle.isDragging) {
                let prevX = bottle.x;
                let prevY = bottle.y;

                bottle.x += (bottle.targetX - bottle.x) * 0.25;
                bottle.y += (bottle.targetY - bottle.y) * 0.25;
                
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;
                
                let speedStr = Math.sqrt(pointer.speedX * pointer.speedX + pointer.speedY * pointer.speedY);
                if (speedStr > 10) {
                    bottle.shakeAmount += speedStr * 0.15;
                    
                    let impactIndex = Math.floor(Math.random() * POINTS_COUNT);
                    waterPoints[impactIndex].v -= pointer.speedX * 0.8;
                    waterPoints[impactIndex].v += pointer.speedY * 0.4;
                }
            } else {
                let homeX = viewSize / 2;
                let homeY = viewSize / 2 + Math.sin(Date.now() * 0.002) * 8 + 10;
                
                let prevX = bottle.x;
                let prevY = bottle.y;
                bottle.x += (homeX - bottle.x) * 0.12;
                bottle.y += (homeY - bottle.y) * 0.12;
                
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;
            }

            bottle.shakeAmount *= 0.94;

            if (bottle.shakeAmount > 15) {
                targetHue = (targetHue + 2) % 360;
                if (Math.random() < 0.5) {
                    let rx = bottle.x + (Math.random() - 0.5) * (bottle.radius * 1.2);
                    let ry = bottle.y + getWaterHeightAt(rx - bottle.x) - 10;
                    createParticle(rx, ry, true);
                }
            }
            liquidHue += (targetHue - liquidHue) * 0.1;

            for (let i = 0; i < POINTS_COUNT; i++) {
                let p = waterPoints[i];
                let force = TENSION * (p.targetY - p.y) - p.v * DAMPING;
                p.v += force;
                p.y += p.v;

                p.v -= pointer.speedX * 0.08 * (p.x / bottle.radius);
                p.v += pointer.speedY * 0.05;
            }

            let leftToRight = new Array(POINTS_COUNT).fill(0);
            let rightToLeft = new Array(POINTS_COUNT).fill(0);

            for (let step = 0; step < 8; step++) {
                for (let i = 0; i < POINTS_COUNT; i++) {
                    if (i > 0) {
                        leftToRight[i] = SPREAD * (waterPoints[i].y - waterPoints[i - 1].y);
                        waterPoints[i - 1].v += leftToRight[i];
                    }
                    if (i < POINTS_COUNT - 1) {
                        rightToLeft[i] = SPREAD * (waterPoints[i].y - waterPoints[i + 1].y);
                        waterPoints[i + 1].v += rightToLeft[i];
                    }
                }
                for (let i = 0; i < POINTS_COUNT; i++) {
                    if (i > 0) waterPoints[i - 1].y += leftToRight[i];
                    if (i < POINTS_COUNT - 1) waterPoints[i + 1].y += rightToLeft[i];
                }
            }

            let targetHeartX = heart.x + pointer.speedX * -0.5;
            heart.vX += (targetHeartX - heart.x) * 0.1;
            heart.vX += (0 - heart.x) * 0.02; 
            heart.vX *= 0.9;
            heart.x += heart.vX;

            heart.x = Math.max(-bottle.radius * 0.75, Math.min(bottle.radius * 0.75, heart.x));

            let currentWaterY = getWaterHeightAt(heart.x);
            heart.y += (currentWaterY - heart.y) * 0.3;

            let deltaX = 10;
            let hLeft = getWaterHeightAt(heart.x - deltaX);
            let hRight = getWaterHeightAt(heart.x + deltaX);
            let targetAngle = Math.atan2(hRight - hLeft, deltaX * 2);

            heart.angleV += (targetAngle - heart.angle) * 0.1;
            heart.angleV *= 0.8;
            heart.angle += heart.angleV;

            if (Math.random() < 0.08) {
                let rAngle = Math.random() * Math.PI;
                let rDist = Math.random() * (bottle.radius * 0.75);
                let bx = bottle.x + Math.cos(rAngle) * rDist;
                let by = bottle.y + Math.sin(rAngle) * rDist;
                if (by > bottle.y + getWaterHeightAt(bx - bottle.x)) {
                    createParticle(bx, by, false);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                p.alpha = Math.max(0, p.life);
                if (p.isStar) p.rotation += p.rotSpeed;

                let dx = p.x - bottle.x;
                let dy = p.y - bottle.y;
                if (dx*dx + dy*dy > bottle.radius * bottle.radius) {
                    p.life -= 0.1;
                }

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, viewSize, viewSize);

            let glowGrad = ctx.createRadialGradient(bottle.x, bottle.y, 10, bottle.x, bottle.y, bottle.radius * 1.5);
            glowGrad.addColorStop(0, `hsla(${liquidHue}, 80%, 60%, 0.15)`);
            glowGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGrad;
            ctx.fillRect(0, 0, viewSize, viewSize);

            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            let neckW = 46;
            let neckY = bottle.y - bottle.radius - 10;

            ctx.fillStyle = '#d97706';
            ctx.beginPath();
            ctx.rect(bottle.x - neckW/2 + 4, neckY - 18, neckW - 8, 20);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(bottle.x - neckW/2 - 6 + 6, neckY);
            ctx.lineTo(bottle.x + neckW/2 + 6 - 6, neckY);
            ctx.arcTo(bottle.x + neckW/2 + 6, neckY, bottle.x + neckW/2 + 6, neckY + 6, 6);
            ctx.lineTo(bottle.x + neckW/2 + 6, neckY + 12 - 6);
            ctx.arcTo(bottle.x + neckW/2 + 6, neckY + 12, bottle.x + neckW/2 + 6 - 6, neckY + 12, 6);
            ctx.lineTo(bottle.x - neckW/2 - 6 + 6, neckY + 12);
            ctx.arcTo(bottle.x - neckW/2 - 6, neckY + 12, bottle.x - neckW/2 - 6, neckY + 12 - 6, 6);
            ctx.lineTo(bottle.x - neckW/2 - 6, neckY + 6);
            ctx.arcTo(bottle.x - neckW/2 - 6, neckY, bottle.x - neckW/2 - 6 + 6, neckY, 6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.beginPath();
            ctx.arc(bottle.x, bottle.y, bottle.radius, 0, Math.PI * 2);
            ctx.clip();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.fill();

            ctx.save();
            ctx.translate(bottle.x, bottle.y);

            ctx.beginPath();
            ctx.moveTo(waterPoints[0].x, waterPoints[0].y);
            
            for (let i = 0; i < POINTS_COUNT - 1; i++) {
                let xc = (waterPoints[i].x + waterPoints[i + 1].x) / 2;
                let yc = (waterPoints[i].y + waterPoints[i + 1].y) / 2;
                ctx.quadraticCurveTo(waterPoints[i].x, waterPoints
