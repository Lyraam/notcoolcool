<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Potion Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b1329;
            background-image: radial-gradient(#1c2541 1px, transparent 1px);
            background-size: 24px 24px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 400px;
            cursor: grab;
        }

        #gameContainer:active {
            cursor: grabbing;
        }

        svg {
            width: 400px;
            height: 400px;
            display: block;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <svg id="potionSvg" viewBox="0 0 400 400">
            <defs>
                <clipPath id="bottleClip">
                    <circle cx="200" cy="210" r="110" />
                </clipPath>
                
                <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop id="gradStop1" offset="0%" stop-color="#2dd4bf" />
                    <stop id="gradStop2" offset="100%" stop-color="#0d9488" />
                </linearGradient>
            </defs>

            <g id="bottleGroup">
                <rect x="182" y="76" width="36" height="18" fill="#d97706" stroke="#1e293b" stroke-width="3.5" stroke-linejoin="round" />
                <rect x="174" y="92" width="52" height="12" fill="#ffffff" stroke="#1e293b" stroke-width="3.5" stroke-linejoin="round" />

                <g clip-path="url(#bottleClip)">
                    <circle cx="200" cy="210" r="110" fill="rgba(255,255,255,0.02)" />
                    <polygon id="liquidPolygon" points="90,225 310,225 310,330 90,330" fill="url(#liquidGrad)" />
                    <line id="liquidSurface" x1="90" y1="225" x2="310" y2="225" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round" />
                    
                    <g id="heartGroup">
                        <path d="M 0 3.25 C 0 -6.5 -13 -6.5 -13 3.25 C -13 10.4 0 14.3 0 16.9 C 0 14.3 13 10.4 13 3.25 C 13 -6.5 0 -6.5 0 3.25 Z" 
                              fill="#ff4b72" stroke="#1e293b" stroke-width="3" stroke-linejoin="round" />
                        <circle cx="-3" cy="-2" r="2.5" fill="rgba(255,255,255,0.35)" />
                    </g>
                </g>

                <circle cx="200" cy="210" r="110" fill="none" stroke="#1e293b" stroke-width="3.5" />
                <path d="M 105 180 A 98 98 0 0 1 140 125" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3.5" stroke-linecap="round" />
            </g>
        </svg>
        <div id="hint">Shake the Potion to Change Gradient Colors! ✨</div>
    </div>

    <script>
        const container = document.getElementById('gameContainer');
        const bottleGroup = document.getElementById('bottleGroup');
        const liquidPolygon = document.getElementById('liquidPolygon');
        const liquidSurface = document.getElementById('liquidSurface');
        const heartGroup = document.getElementById('heartGroup');
        const gradStop1 = document.getElementById('gradStop1');
        const gradStop2 = document.getElementById('gradStop2');

            x: 200, y: 210,
            targetX: 200, targetY: 210,
            isDragging: false,
            shakeAmount: 0
        };

        let pointer = { speedX: 0, speedY: 0 };
        let liquidAngle = 0;
        let liquidAngleV = 0;
        const baseLevelY = 225; // water midpoint inside the bottle

        let heart = { x: 200, y: 225, vx: 0, targetX: 200, angle: 0 };

        function updatePhysics() {
            let prevX = bottle.x;
            let prevY = bottle.y;

            if (bottle.isDragging) {
                bottle.x += (bottle.targetX - bottle.x) * 0.22;
                bottle.y += (bottle.targetY - bottle.y) * 0.22;
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;

                let dist = Math.sqrt(pointer.speedX * pointer.speedX + pointer.speedY * pointer.speedY);
                if (dist > 1) bottle.shakeAmount += dist * 0.5;
            } else {
                let homeX = 200;
                let homeY = 210 + Math.sin(Date.now() * 0.0025) * 5;
                bottle.x += (homeX - bottle.x) * 0.12;
                bottle.y += (homeY - bottle.y) * 0.12;
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;
            }

            // Decay shake amount
            bottle.shakeAmount *= 0.94;
            if (bottle.shakeAmount > 100) bottle.shakeAmount = 100;

            // Liquid angle rotation mechanics
            let ax = pointer.speedX * 0.004;
            let gravity = -liquidAngle * 0.1;
            liquidAngleV += ax + gravity;
            liquidAngleV *= 0.85;
            liquidAngle += liquidAngleV;

            if (liquidAngle < -0.6) liquidAngle = -0.6;
            if (liquidAngle > 0.6) liquidAngle = 0.6;

            // Floating Heart tracking local coordinates
            heart.vx += (pointer.speedX * -0.15);
            heart.vx += (200 - heart.targetX) * 0.04;
            heart.vx *= 0.82;
            heart.targetX += heart.vx;
            heart.targetX = Math.max(125, Math.min(275, heart.targetX));

            let localHX = heart.targetX - 200;
            heart.y = baseLevelY + Math.tan(liquidAngle) * localHX;
            heart.angle = liquidAngle * (180 / Math.PI);

            // Apply SVG transforms
            bottleGroup.setAttribute('transform', `translate(${bottle.x - 200}, ${bottle.y - 210})`);
