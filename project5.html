<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Potion Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b1329;
            background-image: radial-gradient(#1c2541 1px, transparent 1px);
            background-size: 24px 24px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvasContainer {
            position: relative;
            width: 400px;
            height: 400px;
        }

        canvas {
            display: block;
            width: 400px;
            height: 400px;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div id="canvasContainer">
        <canvas id="potionCanvas" width="400" height="400"></canvas>
        <div id="hint">Shake the Potion to Change Gradient Colors! ✨</div>
    </div>

    <script>
        const canvas = document.getElementById('potionCanvas');
        const ctx = canvas.getContext('2d');

        const strokeColor = '#1e293b';
        const strokeWidth = 3.5;
        
        let bottle = {
            x: 200,
            y: 210,
            targetX: 200,
            targetY: 210,
            radius: 110,
            isDragging: false,
            shakeAmount: 0
        };

        let pointer = { speedX: 0, speedY: 0 };

        // Liquid physics states
        let liquidAngle = 0;
        let liquidAngleV = 0;
        let liquidLevelY = 15; // default level offset from bottle center

        let heart = {
            x: 0,
            y: 15,
            vX: 0,
            vY: 0,
            angle: 0,
            angleV: 0,
            size: 26
        };

        let bubbles = [];
        for (let i = 0; i < 10; i++) {
            bubbles.push({
                angle: Math.random() * Math.PI * 2,
                dist: Math.random() * 85,
                size: Math.random() * 4 + 2.5,
                seed: Math.random() * 100
            });
        }

        function drawHeartShape(cx, cy, size) {
            ctx.beginPath();
            ctx.moveTo(cx, cy + size / 4);
            ctx.bezierCurveTo(cx, cy - size / 2, cx - size, cy - size / 2, cx - size, cy + size / 4);
            ctx.bezierCurveTo(cx - size, cy + size * 0.8, cx, cy + size * 1.1, cx, cy + size * 1.3);
            ctx.bezierCurveTo(cx, cy + size * 1.1, cx + size, cy + size * 0.8, cx + size, cy + size / 4);
            ctx.bezierCurveTo(cx + size, cy - size / 2, cx, cy - size / 2, cx, cy + size / 4);
            ctx.closePath();
        }

        function getWaterHeightAt(localX) {
            // Calculated from the current tilted straight line of the fluid
            return liquidLevelY + Math.tan(liquidAngle) * localX;
        }

        function updatePhysics() {
            let prevX = bottle.x;
            let prevY = bottle.y;

            if (bottle.isDragging) {
                bottle.x += (bottle.targetX - bottle.x) * 0.22;
                bottle.y += (bottle.targetY - bottle.y) * 0.22;
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;

                let moveDist = Math.sqrt(pointer.speedX * pointer.speedX + pointer.speedY * pointer.speedY);
                if (moveDist > 2) {
                    bottle.shakeAmount += moveDist * 0.4;
                }
            } else {
                let homeX = 200;
                let homeY = 210 + Math.sin(Date.now() * 0.0025) * 5;
                bottle.x += (homeX - bottle.x) * 0.12;
                bottle.y += (homeY - bottle.y) * 0.12;
                pointer.speedX = bottle.x - prevX;
                pointer.speedY = bottle.y - prevY;
            }

            // Decay shake amount gradually back to 0
            bottle.shakeAmount *= 0.95;
            if (bottle.shakeAmount > 100) bottle.shakeAmount = 100;

            // Physical inertia for the water angle based on acceleration/movement
            let ax = pointer.speedX * 0.005; // horizontal acceleration impact
            let gravityRestoration = -liquidAngle * 0.08; // force pulling water back flat
            
            liquidAngleV += ax + gravityRestoration;
            liquidAngleV *= 0.88; // damping to avoid infinite crazy vibration
            liquidAngle += liquidAngleV;

            // Constrain extreme water tilt angles to look realistic
            if (liquidAngle < -Math.PI / 4) liquidAngle = -Math.PI / 4;
            if (liquidAngle > Math.PI / 4) liquidAngle = Math.PI / 4;

            // Floating Heart Physics (rides the tilted surface)
            heart.vX += (pointer.speedX * -0.15);
            heart.vX += (0 - heart.x) * 0.04;
            heart.vX *= 0.82;
            heart.x += heart.vX;
            heart.x = Math.max(-75, Math.min(75, heart.x));

            let currentWaterY = getWaterHeightAt(heart.x);
            heart.y += (currentWaterY - heart.y) * 0.3;

            // Align heart rotation perfectly parallel to the water's surface tilt
            heart.angleV += (liquidAngle - heart.angle) * 0.2;
            heart.angleV *= 0.6;
            heart.angle += heart.angleV;
        }

        function drawGame() {
            ctx.clearRect(0, 0, 400, 400);

            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 1. Draw Cork and Neck
            let neckY = bottle.y - 110 - 8;
            ctx.fillStyle = '#d97706';
            ctx.beginPath();
            ctx.rect(bottle.x - 18, neckY - 16, 36, 18);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.rect(bottle.x - 26, neckY, 52, 12);
            ctx.fill();
            ctx.stroke();

            // 2. Setup Shake-Based Gradient Colors
            // Mix between base teal-green gradient and shaken violet-pink gradient
            let mixRatio = Math.min(1, bottle.shakeAmount / 45); 
            
            let colorA_Start = [45, 212, 191]; // #2dd4bf (Teal)
            let colorA_End = [13, 148, 136];   // #0d9488
            
            let colorB_Start = [192, 132, 252]; // #c084fc (Purple)
            let colorB_End = [219, 39, 119];   // #db2777 (Pink)

            let r1 = Math.round(colorA_Start[0] + (colorB_Start[0] - colorA_Start[0]) * mixRatio);
            let g1 = Math.round(colorA_Start[1] + (colorB_Start[1] - colorA_Start[1]) * mixRatio);
            let b1 = Math.round(colorA_Start[2] + (colorB_Start[2] - colorA_Start[2]) * mixRatio);

            let r2 = Math.round(colorA_End[0] + (colorB_End[0] - colorA_End[0]) * mixRatio);
            let g2 = Math.round(colorA_End[1] + (colorB_End[1] - colorA_End[1]) * mixRatio);
            let b2 = Math.round(colorA_End[2] + (colorB_End[2] - colorA_End[2]) * mixRatio);

            let fluidGradient = ctx.createLinearGradient(bottle.x, bottle.y - 60, bottle.x, bottle.y + 110);
            fluidGradient.addColorStop(0, `rgb(${r1}, ${g1}, ${b1})`);
            fluidGradient.addColorStop(1, `rgb(${r2}, ${g2}, ${b2})`);

            // 3. Draw Liquid Base (Rendered by sweeping a segment along the bottom circle geometry)
            ctx.fillStyle = fluidGradient;
            ctx.beginPath();
            
            // Left water intersect point on the container circle
            let leftX = -110;
            let leftY = getWaterHeightAt(leftX);
            ctx.moveTo(bottle.x + leftX, bottle.y + leftY);

            // Right water intersect point
            let rightX = 110;
            let rightY = getWaterHeightAt(rightX);
            ctx.lineTo(bottle.x + rightX, bottle.y + rightY);

            // Sweep the lower circular arc of the bottle to wrap the liquid container shape
            let steps = 40;
            for (let i = 0; i <= steps; i++) {
                let ratio = i / steps;
                let arcAngle = ratio * Math.PI; // Bottom half arc from 0 to Pi
                let cx = bottle.x + Math.cos(arcAngle) * 110;
                let cy = bottle.y + Math.sin(arcAngle) * 110;
                
                // Only inject arc vertices that sit structurally below the dynamic liquid line
                let localCX = cx - bottle.x;
                if (cy > bottle.y + getWaterHeightAt(localCX)) {
                    ctx.lineTo(cx, cy);
                }
            }
            ctx.closePath();
            ctx.fill();

            // 4. Draw Thinner Stroke Water Surface Line
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.beginPath();
            ctx.moveTo(bottle.x + leftX, bottle.y + getWaterHeightAt(leftX));
            ctx.lineTo(bottle.x + rightX, bottle.y + getWaterHeightAt(rightX));
            ctx.stroke();

            // 5. Render Bubbles inside water
            bubbles.forEach(b => {
                let waveOffset = Math.sin(Date.now() * 0.002 + b.seed) * 4;
                let bx = bottle.x + Math.cos(b.angle) * (b.dist + waveOffset);
                let by = bottle.y + Math.sin(b.angle) * (b.dist + waveOffset);
                
                let localX = bx - bottle.x;
                let localY = by - bottle.y;
                let waterSurfaceY = getWaterHeightAt(localX);
                let distToCenter = Math.sqrt(localX * localX + localY * localY);

                // Ensure bubbles are below surface and inside glass bounds
                if (localY > waterSurfaceY + 6 && distToCenter < 102) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = 2; 
                    ctx.beginPath();
                    ctx.arc(bx, by, b.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            });

            // 6. Render Floating Heart
            ctx.save();
            ctx.translate(bottle.x + heart.x, bottle.y + heart.y - 4);
            ctx.rotate(heart.angle);
            ctx.fillStyle = '#ff4b72';
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 3; 
            drawHeartShape(0, 0, 13);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.beginPath();
            ctx.arc(-3, -2, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 7. Outer Glass Bottle Ring & Reflection Highlight
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = strokeWidth;
            ctx.beginPath();
            ctx.arc(bottle.x, bottle.y, 110, 0, Math.PI * 2);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            ctx.arc(bottle.x, bottle.y, 98, Math.PI * 1.05, Math.PI * 1.4);
            ctx.stroke();
        }

        function gameLoop() {
            updatePhysics();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function onStart(e) {
            let pos = getPointerPos(e);
            let dx = pos.x - bottle.x;
            let dy = pos.y - bottle.y;
            if (dx*dx + dy*dy < 16000) {
                bottle.isDragging = true;
                bottle.targetX = pos.x;
                bottle.targetY = pos.y;
            }
        }

        function onMove(e) {
            if (!bottle.isDragging) return;
            let pos = getPointerPos(e);
