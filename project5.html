<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Potion Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0b1329;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvasContainer {
            position: relative;
            width: 400px;
            height: 400px;
        }

        canvas {
            display: block;
            width: 400px;
            height: 400px;
            background-color: #111827;
            border: 4px solid #374151;
        }

        #errorConsole {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.85);
            color: #fff;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
            display: none;
            z-index: 999;
            white-space: pre-wrap;
            pointer-events: none;
        }

        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvasContainer">
        <div id="errorConsole"></div>
        <canvas id="potionCanvas" width="400" height="400"></canvas>
        <div id="hint">Drag and Shake the Bottle ✨</div>
    </div>

    <script>
        const errorConsole = document.getElementById('errorConsole');
        window.onerror = function(msg, url, line) {
            errorConsole.style.display = 'block';
            errorConsole.innerText += `Error: ${msg}\nLine: ${line}\n\n`;
            return false;
        };

        try {
            const canvas = document.getElementById('potionCanvas');
            const ctx = canvas.getContext('2d');

            let bottleX = 200;
            let bottleY = 200;
            let targetX = 200;
            let targetY = 200;
            let radius = 100;
            let isDragging = false;
            
            let heartX = 0;
            let heartY = 20;
            let heartVx = 0;
            let waveTimer = 0;

            function update() {
                waveTimer += 0.05;

                if (isDragging) {
                    bottleX += (targetX - bottleX) * 0.2;
                    bottleY += (targetY - bottleY) * 0.2;
                } else {
                    bottleX += (200 - bottleX) * 0.1;
                    bottleY += (200 + Math.sin(Date.now() * 0.003) * 10 - bottleY) * 0.1;
                }

                let speedX = targetX - bottleX;
                heartVx += speedX * -0.05;
                heartVx += (0 - heartX) * 0.05;
                heartVx *= 0.85;
                heartX += heartVx;

                if (heartX < -60) heartX = -60;
                if (heartX > 60) heartX = 60;

                heartY = 15 + Math.sin(waveTimer + heartX * 0.05) * 8;
            }

            function draw() {
                ctx.clearRect(0, 0, 400, 400);

                ctx.fillStyle = '#1e293b';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.rect(bottleX - 20, bottleY - radius - 15, 40, 20);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#38bdf8';
                ctx.beginPath();
                ctx.arc(bottleX, bottleY, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#ff007f';
                ctx.beginPath();
                let renderHeartX = bottleX + heartX;
                let renderHeartY = bottleY + heartY;
                ctx.arc(renderHeartX, renderHeartY, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('♥', renderHeartX, renderHeartY + 4);
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            function getMousePos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                let pos = getMousePos(e);
                targetX = pos.x;
                targetY = pos.y;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let pos = getMousePos(e);
                targetX = pos.x;
                targetY = pos.y;
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });

            canvas.addEventListener('touchstart', (e) => {
                isDragging = true;
                let pos = getMousePos(e);
                targetX = pos.x;
                targetY = pos.y;
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                let pos = getMousePos(e);
                targetX = pos.x;
                targetY = pos.y;
            }, { passive: true });

            window.addEventListener('touchend', () => {
                isDragging = false;
            });

            loop();

        } catch (err) {
            errorConsole.style.display = 'block';
            errorConsole.innerText += `Catch Block Error: ${err.message}\n\n`;
        }
    </script>

</body>
</html>
