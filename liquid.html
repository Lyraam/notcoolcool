<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Liquid Splash Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        #canvasZone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: blur(8px) contrast(20);
        }

        .btn-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            font-family: sans-serif;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div class="btn-label" id="label">RAGE!</div>
    <div id="canvasZone"></div>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const { Engine, Render, Runner, Bodies, Composite, Body, Vector } = Matter;

        const engine = Engine.create({ gravity: { y: 1.4 } });
        const world = engine.world;

        const canvasZone = document.getElementById('canvasZone');
        
        const render = Render.create({
            element: canvasZone,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#0b1329'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSplatterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(110 + Math.random() * 50, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let currentHue = 0;
        let cx = window.innerWidth / 2;
        let cy = window.innerHeight / 2;

        const btnW = 240;
        const btnH = 90;
        const thickness = 16;

        function updateLabelPosition() {
            const label = document.getElementById('label');
            label.style.left = `${cx}px`;
            label.style.top = `${cy}px`;
        }
        updateLabelPosition();

        let wallOptions = { 
            isStatic: true, 
            render: { fillStyle: 'rgba(255, 255, 255, 0.25)' } 
        };
        
        let bottom = Bodies.rectangle(cx, cy + btnH/2 - thickness/2, btnW, thickness, wallOptions);
        let left = Bodies.rectangle(cx - btnW/2 + thickness/2, cy, thickness, btnH, wallOptions);
        let right = Bodies.rectangle(cx + btnW/2 - thickness/2, cy, thickness, btnH, wallOptions);

        let buttonGroup = [bottom, left, right];
        Composite.add(world, buttonGroup);

        const liquidParticles = [];

        function spawnLiquid() {
            const color = `hsl(${currentHue}, 100%, 60%)`;
            const rows = 8;
            const cols = 14;
            const radius = 7;

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const px = cx - (cols * radius * 0.8) + (j * radius * 1.6) + (Math.random() - 0.5) * 2;
                    const py = cy + (btnH/3) - (i * radius * 1.6);
                    
                    const drop = Bodies.circle(px, py, radius, {
                        restitution: 0.4,
                        friction: 0.0,
                        frictionAir: 0.005,
                        density: 0.04,
                        render: { fillStyle: color }
                    });
                    liquidParticles.push(drop);
                    Composite.add(world, drop);
                }
            }
        }
        spawnLiquid();

        function checkBounds() {
            const buffer = 50;
            liquidParticles.forEach(drop => {
                if (drop.position.y > window.innerHeight + buffer || 
                    drop.position.x < -buffer || 
                    drop.position.x > window.innerWidth + buffer) {
                    
                    const rx = cx + (Math.random() - 0.5) * (btnW - 40);
                    const ry = cy + (btnH / 4);
                    
                    Body.setPosition(drop, Vector.create(rx, ry));
                    Body.setVelocity(drop, Vector.create(0, 0));
                }
            });
            requestAnimationFrame(checkBounds);
        }
        checkBounds();

        window.addEventListener('pointerdown', function(e) {
            const btnX1 = cx - btnW/2;
            const btnX2 = cx + btnW/2;
            const btnY1 = cy - btnH/2;
            const btnY2 = cy + btnH/2;

            if (e.clientX >= btnX1 && e.clientX <= btnX2 && e.clientY >= btnY1 && e.clientY <= btnY2) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSplatterSound();

                if (navigator.vibrate) navigator.vibrate(25);

                currentHue = (currentHue + 40) % 360;
                const newColor = `hsl(${currentHue}, 100%, 60%)`;

                liquidParticles.forEach(body => {
                    body.render.fillStyle = newColor;
                    
                    const distanceX = body.position.x - cx;
                    const distanceY = body.position.y - (cy + btnH/4);
                    
                    const forceX = (distanceX / btnW) * 0.08 + (Math.random() - 0.5) * 0.05;
                    const forceY = -0.16 - Math.random() * 0.12;
                    
                    Body.applyForce(body, body.position, Vector.create(forceX, forceY));
                });

                buttonGroup.forEach(part => {
                    Body.translate(part, Vector.create(0, 8));
                    setTimeout(() => {
                        Body.translate(part, Vector.create(0, -8));
                    }, 50);
                });
            }
        });

        window.addEventListener('resize', () => {
            cx = window.innerWidth / 2;
            cy = window.innerHeight / 2;
            updateLabelPosition();

            render.bounds.max.x = window.innerWidth;
            render.bounds.max.y = window.innerHeight;
            render.options.width = window.innerWidth;
            render.options.height = window.innerHeight;

            Body.setPosition(bottom, Vector.create(cx, cy + btnH/2 - thickness/2));
            Body.setPosition(left, Vector.create(cx - btnW/2 + thickness/2, cy));
            Body.setPosition(right, Vector.create(cx + btnW/2 - thickness/2, cy));
        });
    </script>

</body>
</html>
