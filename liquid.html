<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Liquid Splash Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        #canvasZone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: blur(6px) contrast(20);
        }

        .btn-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            font-family: sans-serif;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div class="btn-label" id="label">RAGE!</div>
    <div id="canvasZone"></div>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const { Engine, Render, Runner, Bodies, Composite, Body, Vector } = Matter;

        const engine = Engine.create({ gravity: { y: 1.5 } });
        const world = engine.world;

        const canvasZone = document.getElementById('canvasZone');
        
        const render = Render.create({
            element: canvasZone,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#0b1329'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSplatterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(90 + Math.random() * 60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let currentHue = 0;
        let cx = window.innerWidth / 2;
        let cy = window.innerHeight / 2;

        const btnW = 240;
        const btnH = 90;
        const thickness = 16;
        const maxGlobalParticles = 350;

        function updateLabelPosition() {
            const label = document.getElementById('label');
            label.style.left = `${cx}px`;
            label.style.top = `${cy}px`;
        }
        updateLabelPosition();

        let wallOptions = { 
            isStatic: true, 
            render: { fillStyle: 'rgba(255, 255, 255, 0.25)' } 
        };
        
        let bottom = Bodies.rectangle(cx, cy + btnH/2 - thickness/2, btnW, thickness, wallOptions);
        let left = Bodies.rectangle(cx - btnW/2 + thickness/2, cy, thickness, btnH, wallOptions);
        let right = Bodies.rectangle(cx + btnW/2 - thickness/2, cy, thickness, btnH, wallOptions);

        let buttonGroup = [bottom, left, right];
        Composite.add(world, buttonGroup);

        function createWaterDrop(x, y, hue) {
            const radius = 6.5;
            return Bodies.circle(x, y, radius, {
                restitution: 0.4,
                friction: 0.0,
                frictionAir: 0.001,
                density: 0.06,
                render: { fillStyle: `hsl(${hue}, 100%, 60%)` }
            });
        }

        function fillButtonWithLiquid(count) {
            for (let i = 0; i < count; i++) {
                const rx = cx + (Math.random() - 0.5) * (btnW - 40);
                const ry = cy + (btnH / 4) - (Math.random() * 30);
                Composite.add(world, createWaterDrop(rx, ry, currentHue));
            }
        }
        fillButtonWithLiquid(100);

        function maintainLiquid() {
            const allBodies = Composite.allBodies(world);
            const particles = allBodies.filter(b => !b.isStatic);
            
            particles.forEach(body => {
                if (body.position.y > window.innerHeight + 150 || 
                    body.position.x < -150 || 
                    body.position.x > window.innerWidth + 150) {
                    Composite.remove(world, body);
                }
            });

            if (particles.length < 60) {
                fillButtonWithLiquid(40);
            }
            requestAnimationFrame(maintainLiquid);
        }
        maintainLiquid();

        window.addEventListener('pointerdown', function(e) {
            const btnX1 = cx - btnW/2;
            const btnX2 = cx + btnW/2;
            const btnY1 = cy - btnH/2;
            const btnY2 = cy + btnH/2;

            if (e.clientX >= btnX1 && e.clientX <= btnX2 && e.clientY >= btnY1 && e.clientY <= btnY2) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSplatterSound();

                if (navigator.vibrate) navigator.vibrate(35);

                currentHue = (currentHue + 40) % 360;
                const newColor = `hsl(${currentHue}, 100%, 60%)`;

                const allBodies = Composite.allBodies(world);
                const particles = allBodies.filter(b => !b.isStatic);

                particles.forEach(body => {
                    body.render.fillStyle = newColor;
                    const distanceX = body.position.x - cx;
                    const forceX = (distanceX / btnW) * 0.15 + (Math.random() - 0.5) * 0.1;
                    const forceY = -0.35 - Math.random() * 0.22;
                    Body.applyForce(body, body.position, Vector.create(forceX, forceY));
                });

                if (particles.length < maxGlobalParticles) {
                    const spawnCount = 40; 
                    for (let i = 0; i < spawnCount; i++) {
                        const rx = cx + (Math.random() - 0.5) * (btnW - 50);
                        const ry = cy + (btnH / 6);
                        const newDrop = createWaterDrop(rx, ry, currentHue);
                        
                        const forceX = (Math.random() - 0.5) * 0.25;
                        const forceY = -0.45 - Math.random() * 0.3; 
                        
                        Composite.add(world, newDrop);
                        Body.applyForce(newDrop, newDrop.position, Vector.create(forceX, forceY));
                    }
                }

                buttonGroup.forEach(part => {
                    Body.translate(part, Vector.create(0, 10));
                    setTimeout(() => {
                        Body.translate(part, Vector.create(0, -10));
                    }, 50);
                });
            }
        });

        window.addEventListener('resize', () => {
            cx = window.innerWidth / 2;
            cy = window.innerHeight / 2;
            updateLabelPosition();

            render.bounds.max.x = window.innerWidth;
            render.bounds.max.y = window.innerHeight;
            render.options.width = window.innerWidth;
            render.options.height = window.innerHeight;

            Body.setPosition(bottom, Vector.create(cx, cy + btnH/2 - thickness/2));
            Body.setPosition(left, Vector.create(cx - btnW/2 + thickness/2, cy));
            Body.setPosition(right, Vector.create(cx + btnW/2 - thickness/2, cy));
        });
    </script>

</body>
</html>
