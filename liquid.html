<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Liquid Splash Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b1329;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        body.shake {
            animation: screen-shake 0.1s ease-in-out;
        }

        .canvas-container {
            position: relative;
            width: 240px;
            height: 90px;
            z-index: 10;
        }

        #btnCanvas {
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 45px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.05s ease;
        }

        #btnCanvas:active {
            transform: scale(0.9);
        }

        #splashCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            filter: blur(8px) contrast(25);
        }

        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 4px); }
            50% { transform: translate(4px, -4px); }
            75% { transform: translate(-4px, -4px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <canvas id="splashCanvas"></canvas>
    <div class="canvas-container">
        <canvas id="btnCanvas" onclick="handleClick(event)"></canvas>
    </div>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const splashCanvas = document.getElementById('splashCanvas');
        const sCtx = splashCanvas.getContext('2d');
        const btnCanvas = document.getElementById('btnCanvas');
        const bCtx = btnCanvas.getContext('2d');

        function resize() {
            splashCanvas.width = window.innerWidth;
            splashCanvas.height = window.innerHeight;
            btnCanvas.width = 240;
            btnCanvas.height = 90;
        }
        window.addEventListener('resize', resize);
        resize();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSplatterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            
            const baseFreq = rageMeter > 50 ? 100 : 150;
            osc.frequency.setValueAtTime(baseFreq + Math.random() * 60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.15);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let rageMeter = 0;
        let currentHue = 0;
        let drops = [];
        const gravity = 0.6;

        let liquidLevel = 0.5;
        let targetLevel = 0.5;
        let wavePhase = 0;
        let sloshAngle = 0;
        let sloshVelocity = 0;
        const sloshK = 0.15;
        const sloshDamping = 0.85;

        function updatePhysics() {
            sCtx.clearRect(0, 0, splashCanvas.width, splashCanvas.height);
            bCtx.clearRect(0, 0, btnCanvas.width, btnCanvas.height);

            const color = `hsl(${currentHue}, 100%, 55%)`;

            bCtx.save();
            bCtx.beginPath();
            bCtx.roundRect(0, 0, btnCanvas.width, btnCanvas.height, 45);
            bCtx.clip();

            bCtx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            bCtx.fillRect(0, 0, btnCanvas.width, btnCanvas.height);

            bCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            bCtx.lineWidth = 4;
            bCtx.strokeRect(0, 0, btnCanvas.width, btnCanvas.height);

            bCtx.fillStyle = color;

            sloshVelocity += (0 - sloshAngle) * sloshK;
            sloshVelocity *= sloshDamping;
            sloshAngle += sloshVelocity;

            wavePhase += 0.15 + (rageMeter / 100) * 0.2;
            targetLevel = 0.5 + (rageMeter / 100) * 0.4;
            liquidLevel += (targetLevel - liquidLevel) * 0.1;

            const baseHeight = btnCanvas.height * (1 - liquidLevel);
            const amp1 = 3 + (rageMeter / 100) * 15;
            const amp2 = 2 + (rageMeter / 100) * 8;

            bCtx.beginPath();
            bCtx.moveTo(0, btnCanvas.height);
            
            for (let x = 0; x <= btnCanvas.width; x++) {
                const sloshOffset = (x - btnCanvas.width / 2) * Math.sin(sloshAngle);
                const wave1 = Math.sin((x * 0.04) + wavePhase) * amp1;
                const wave2 = Math.cos((x * 0.09) - wavePhase * 1.3) * amp2;
                const y = baseHeight + sloshOffset + wave1 + wave2;
                bCtx.lineTo(x, y);
            }

            bCtx.lineTo(btnCanvas.width, btnCanvas.height);
            bCtx.closePath();
            bCtx.fill();

            bCtx.fillStyle = 'white';
            bCtx.font = '900 28px sans-serif';
            bCtx.textAlign = 'center';
            bCtx.textBaseline = 'middle';
            bCtx.fillText('RAGE!', btnCanvas.width / 2, btnCanvas.height / 2);
            bCtx.restore();

            if (drops.length > 0) {
                sCtx.fillStyle = color;
                drops = drops.filter(drop => {
                    drop.x += drop.vx;
                    drop.y += drop.vy;
                    drop.vy += gravity;
                    drop.size *= 0.96;

                    sCtx.beginPath();
                    sCtx.arc(drop.x, drop.y, drop.size, 0, Math.PI * 2);
                    sCtx.fill();

                    if (drop.size < 6 || drop.y > splashCanvas.height) {
                        return false;
                    }
                    return true;
                });
            }

            requestAnimationFrame(updatePhysics);
        }
        updatePhysics();

        function handleClick(e) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            playSplatterSound();
            const vibeLevel = rageMeter > 50 ? [50, 15, 50] : 25;
            if (navigator.vibrate) navigator.vibrate(vibeLevel);

            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');

            rageMeter = Math.min(rageMeter + 14, 100);
            currentHue = (currentHue + 35) % 360; 

            sloshVelocity += (Math.random() > 0.5 ? 1 : -1) * 0.4;

            const numDrops = Math.floor(30 + (rageMeter / 100) * 110); 
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for (let i = 0; i < numDrops; i++) {
                const size = (Math.random() * 18 + 12) * (1 + rageMeter / 100); 
                const angle = Math.random() * Math.PI * 2;
                const power = (Math.random() * 14 + 7) * (1 + (rageMeter / 100) * 1.3); 
                const vx = Math.cos(angle) * power;
                const vy = Math.sin(angle) * power - 6;

                drops.push({
                    x: centerX,
                    y: centerY,
                    vx: vx,
                    vy: vy,
                    size: size
                });
            }
        }

        setInterval(() => {
            rageMeter = Math.max(rageMeter - 6, 0);
        }, 200);
    </script>

</body>
</html>
