<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Liquid Splash Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        #canvasZone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .btn-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div class="btn-label">RAGE!</div>
    <div id="canvasZone"></div>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const { Engine, Render, Runner, Bodies, Composite, Body, Vector } = Matter;

        const engine = Engine.create({ gravity: { y: 1 } });
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('canvasZone'),
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#0b1329'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSplatterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120 + Math.random() * 60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let currentHue = 0;
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;

        const btnW = 240;
        const btnH = 90;
        const thickness = 10;

        const wallOptions = { isStatic: true, render: { fillStyle: 'rgba(255,255,255,0.15)' } };
        
        const bottom = Bodies.rectangle(cx, cy + btnH/2, btnW, thickness, wallOptions);
        const topWall = Bodies.rectangle(cx, cy - btnH/2, btnW, thickness, wallOptions);
        const left = Bodies.rectangle(cx - btnW/2, cy, thickness, btnH, wallOptions);
        const right = Bodies.rectangle(cx + btnW/2, cy, thickness, btnH, wallOptions);

        const buttonGroup = [bottom, topWall, left, right];
        Composite.add(world, buttonGroup);

        const ground = Bodies.rectangle(cx, window.innerHeight + 50, window.innerWidth * 2, 100, { isStatic: true, render: { visible: false } });
        Composite.add(world, ground);

        function spawnLiquid() {
            const color = `hsl(${currentHue}, 100%, 55%)`;
            const rows = 6;
            const cols = 12;
            const radius = 6;

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const px = cx - (cols * radius) + (j * radius * 2) + (Math.random() - 0.5) * 2;
                    const py = cy + (btnH/4) - (i * radius * 2);
                    
                    const drop = Bodies.circle(px, py, radius, {
                        restitution: 0.2,
                        friction: 0.005,
                        density: 0.02,
                        slop: 0,
                        render: { fillStyle: color }
                    });
                    Composite.add(world, drop);
                }
            }
        }
        spawnLiquid();

        window.addEventListener('pointerdown', function(e) {
            const btnX1 = cx - btnW/2;
            const btnX2 = cx + btnW/2;
            const btnY1 = cy - btnH/2;
            const btnY2 = cy + btnH/2;

            if (e.clientX >= btnX1 && e.clientX <= btnX2 && e.clientY >= btnY1 && e.clientY <= btnY2) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSplatterSound();

                if (navigator.vibrate) navigator.vibrate(25);

                currentHue = (currentHue + 40) % 360;
                const newColor = `hsl(${currentHue}, 100%, 55%)`;

                const forceMagnitude = 0.08;
                const bodies = Composite.allBodies(world);

                bodies.forEach(body => {
                    if (!body.isStatic) {
                        body.render.fillStyle = newColor;
                        
                        const angle = Math.random() * Math.PI * 2;
                        const force = Vector.create(Math.cos(angle) * forceMagnitude, Math.sin(angle) * forceMagnitude - 0.05);
                        Body.applyForce(body, body.position, force);
                    }
                });

                buttonGroup.forEach(part => {
                    Body.translate(part, Vector.create(0, 8));
                    setTimeout(() => {
                        Body.translate(part, Vector.create(0, -8));
                    }, 50);
                });
            }
        });

        window.addEventListener('resize', () => {
            render.bounds.max.x = window.innerWidth;
            render.bounds.max.y = window.innerHeight;
            render.options.width = window.innerWidth;
            render.options.height = window.innerHeight;
            Render.setPixelRatio(render, window.devicePixelRatio);
        });
    </script>

</body>
</html>
