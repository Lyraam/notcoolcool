<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Liquid Splash Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b1329;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        body.shake {
            animation: screen-shake 0.1s ease-in-out;
        }

        #mainCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 4px); }
            50% { transform: translate(4px, -4px); }
            75% { transform: translate(-4px, -4px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSplatterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            
            const baseFreq = rageMeter > 50 ? 100 : 150;
            osc.frequency.setValueAtTime(baseFreq + Math.random() * 60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.15);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let rageMeter = 0;
        let currentHue = 0;
        let drops = [];
        const gravity = 0.6;

        let liquidLevel = 0.5;
        let targetLevel = 0.5;
        let wavePhase = 0;
        let sloshAngle = 0;
        let sloshVelocity = 0;
        const sloshK = 0.18;
        const sloshDamping = 0.82;

        const btnW = 240;
        const btnH = 90;
        const btnR = 45;

        function drawButtonOutline(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function updatePhysics() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const btnX = (canvas.width - btnW) / 2;
            const btnY = (canvas.height - btnH) / 2;

            wavePhase += 0.12 + (rageMeter / 100) * 0.25;
            targetLevel = 0.45 + (rageMeter / 100) * 0.45;
            liquidLevel += (targetLevel - liquidLevel) * 0.1;

            sloshVelocity += (0 - sloshAngle) * sloshK;
            sloshVelocity *= sloshDamping;
            sloshAngle += sloshVelocity;

            ctx.save();
            drawButtonOutline(btnX, btnY, btnW, btnH, btnR);
            ctx.clip();

            let bgGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
            bgGrad.addColorStop(0, '#111827');
            bgGrad.addColorStop(1, '#030712');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(btnX, btnY, btnW, btnH);

            const baseHeight = btnY + btnH * (1 - liquidLevel);
            const ampBase = 3 + (rageMeter / 100) * 16;

            ctx.fillStyle = `hsl(${currentHue}, 90%, 20%)`;
            ctx.beginPath();
            ctx.moveTo(btnX, btnY + btnH);
            for (let x = btnX; x <= btnX + btnW; x++) {
                const sloshOffset = (x - (btnX + btnW / 2)) * Math.sin(sloshAngle * 0.9);
                const w1 = Math.sin((x * 0.035) - wavePhase * 0.8) * (ampBase * 0.8);
                const w2 = Math.cos((x * 0.07) + wavePhase * 1.1) * (ampBase * 0.4);
                ctx.lineTo(x, baseHeight + sloshOffset + w1 + w2 + 4);
            }
            ctx.lineTo(btnX + btnW, btnY + btnH);
            ctx.closePath();
            ctx.fill();

            let liqGrad = ctx.createLinearGradient(btnX, baseHeight - 20, btnX, btnY + btnH);
            liqGrad.addColorStop(0, `hsl(${currentHue}, 100%, 65%)`);
            liqGrad.addColorStop(0.3, `hsl(${currentHue}, 100%, 50%)`);
            liqGrad.addColorStop(1, `hsl(${currentHue}, 100%, 15%)`);
            ctx.fillStyle = liqGrad;

            ctx.beginPath();
            ctx.moveTo(btnX, btnY + btnH);
            for (let x = btnX; x <= btnX + btnW; x++) {
                const sloshOffset = (x - (btnX + btnW / 2)) * Math.sin(sloshAngle);
                const w1 = Math.sin((x * 0.045) + wavePhase) * ampBase;
                const w2 = Math.cos((x * 0.09) - wavePhase * 1.4) * (ampBase * 0.5);
                const w3 = Math.sin((x * 0.25) + wavePhase * 3.0) * (1 + (rageMeter / 100) * 4);
                ctx.lineTo(x, baseHeight + sloshOffset + w1 + w2 + w3);
            }
            ctx.lineTo(btnX + btnW, btnY + btnH);
            ctx.closePath();
            ctx.fill();

            let glassGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
            glassGrad.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
            glassGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.02)');
            glassGrad.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
            ctx.fillStyle = glassGrad;
            ctx.fillRect(btnX, btnY, btnW, btnH);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.lineWidth = 4;
            drawButtonOutline(btnX, btnY, btnW, btnH, btnR);
            ctx.stroke();

            ctx.shadowColor = 'transparent';
            ctx.fillStyle = 'white';
            ctx.font = '900 28px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('RAGE!', canvas.width / 2, canvas.height / 2);
            ctx.restore();

            if (drops.length > 0) {
                drops = drops.filter(drop => {
                    drop.x += drop.vx;
                    drop.y += drop.vy;
                    drop.vy += gravity;
                    drop.size *= 0.96;

                    let dropGrad = ctx.createRadialGradient(drop.x, drop.y, 0, drop.x, drop.y, drop.size);
                    dropGrad.addColorStop(0, `hsl(${drop.hue}, 100%, 70%)`);
                    dropGrad.addColorStop(0.4, `hsl(${drop.hue}, 100%, 50%)`);
                    dropGrad.addColorStop(1, `hsl(${drop.hue}, 100%, 30%, 0)`);

                    ctx.fillStyle = dropGrad;
                    ctx.beginPath();
                    ctx.arc(drop.x, drop.y, drop.size, 0, Math.PI * 2);
                    ctx.fill();

                    if (drop.size < 2 || drop.y > canvas.height) {
                        return false;
                    }
                    return true;
                });
            }

            requestAnimationFrame(updatePhysics);
        }
        updatePhysics();

        window.addEventListener('pointerdown', function(e) {
            const btnX = (canvas.width - btnW) / 2;
            const btnY = (canvas.height - btnH) / 2;

            if (e.clientX >= btnX && e.clientX <= btnX + btnW &&
                e.clientY >= btnY && e.clientY <= btnY + btnH) {
                
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playSplatterSound();

                if (navigator.vibrate) {
                    const vibeLevel = rageMeter > 50 ? [50, 15, 50] : 25;
                    navigator.vibrate(vibeLevel);
                }

                document.body.classList.remove('shake');
                void document.body.offsetWidth;
                document.body.classList.add('shake');

                rageMeter = Math.min(rageMeter + 14, 100);
                currentHue = (currentHue + 35) % 360;

                sloshVelocity += (Math.random() > 0.5 ? 1 : -1) * 0.65;

                const numDrops = Math.floor(30 + (rageMeter / 100) * 110);
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                for (let i = 0; i < numDrops; i++) {
                    const size = (Math.random() * 15 + 10) * (1 + rageMeter / 100);
                    const angle = Math.random() * Math.PI * 2;
                    const power = (Math.random() * 14 + 7) * (1 + (rageMeter / 100) * 1.3);
                    const vx = Math.cos(angle) * power;
                    const vy = Math.sin(angle) * power - 6;

                    drops.push({
                        x: centerX,
                        y: centerY,
                        vx: vx,
                        vy: vy,
                        size: size,
                        hue: currentHue
                    });
                }
            }
        });

        setInterval(() => {
            rageMeter = Math.max(rageMeter - 7, 0);
        }, 200);
    </script>

</body>
</html>
