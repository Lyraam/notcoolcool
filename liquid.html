<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Liquid Splash Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        body.shake {
            animation: screen-shake 0.1s ease-in-out;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: contrast(20);
            pointer-events: none;
        }

        .satisfying-btn {
            padding: 25px 50px;
            font-size: 28px;
            font-weight: 900;
            color: white;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            background: #ff0055;
            transition: transform 0.05s ease, background-color 0.1s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .satisfying-btn:active {
            transform: scale(0.85);
        }

        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 4px); }
            50% { transform: translate(4px, -4px); }
            75% { transform: translate(-4px, -4px); }
            100% { transform: translate(0, 0); }
        }

        .liquid-drop {
            position: absolute;
            border-radius: 50%;
            filter: blur(6px);
            will-change: transform;
        }
    </style>
</head>
<body>

    <div class="container" id="stage"></div>
    <button class="satisfying-btn" id="btn" onclick="handleClick(event)">RAGE!</button>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSplatterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            
            const baseFreq = rageMeter > 50 ? 90 : 140;
            osc.frequency.setValueAtTime(baseFreq + Math.random() * 60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let rageMeter = 0;
        let currentHue = 0;
        let drops = [];
        const gravity = 0.6;
        const stage = document.getElementById('stage');
        const btn = document.getElementById('btn');

        function updatePhysics() {
            drops = drops.filter(drop => {
                drop.x += drop.vx;
                drop.y += drop.vy;
                drop.vy += gravity;
                drop.size *= 0.95;

                const el = drop.element;
                el.style.transform = `translate3d(${drop.x}px, ${drop.y}px, 0)`;
                el.style.width = `${drop.size}px`;
                el.style.height = `${drop.size}px`;

                if (drop.size < 6 || drop.y > window.innerHeight) {
                    el.remove();
                    return false;
                }
                return true;
            });
            requestAnimationFrame(updatePhysics);
        }
        updatePhysics();

        function handleClick(e) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            playSplatterSound();
            const vibeLevel = rageMeter > 50 ? [50, 15, 50] : 25;
            if (navigator.vibrate) navigator.vibrate(vibeLevel);

            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');

            rageMeter = Math.min(rageMeter + 12, 100);
            
            currentHue = (currentHue + 40) % 360; 
            const color = `hsl(${currentHue}, 100%, 55%)`;
            btn.style.backgroundColor = color;

            const numDrops = Math.floor(30 + (rageMeter / 100) * 120); 
            const rect = btn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < numDrops; i++) {
                const el = document.createElement('div');
                el.classList.add('liquid-drop');
                el.style.backgroundColor = color;
                
                const size = (Math.random() * 30 + 20) * (1 + rageMeter / 100); 
                el.style.width = `${size}px`;
                el.style.height = `${size}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const power = (Math.random() * 12 + 6) * (1 + (rageMeter / 100) * 1.5); 
                const vx = Math.cos(angle) * power;
                const vy = Math.sin(angle) * power - 8;

                drops.push({
                    element: el,
                    x: centerX - size / 2,
                    y: centerY - size / 2,
                    vx: vx,
                    vy: vy,
                    size: size
                });
                stage.appendChild(el);
            }
        }

        setInterval(() => {
            rageMeter = Math.max(rageMeter - 8, 0);
        }, 200);
    </script>

</body>
</html>
