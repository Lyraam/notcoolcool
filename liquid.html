<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Liquid Splash Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b1329;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        body.shake {
            animation: screen-shake 0.1s ease-in-out;
        }

        .canvas-container {
            position: relative;
            width: 240px;
            height: 90px;
            z-index: 10;
        }

        #btnCanvas {
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 45px;
            box-shadow: inset 0 4px 12px rgba(255,255,255,0.15), 0 20px 40px rgba(0,0,0,0.6);
            transition: transform 0.05s ease;
        }

        #btnCanvas:active {
            transform: scale(0.9);
        }

        #splashCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            filter: blur(8px) contrast(25);
        }

        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 4px); }
            50% { transform: translate(4px, -4px); }
            75% { transform: translate(-4px, -4px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <canvas id="splashCanvas"></canvas>
    <div class="canvas-container">
        <canvas id="btnCanvas" onclick="handleClick(event)"></canvas>
    </div>

    <script>
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        const splashCanvas = document.getElementById('splashCanvas');
        const sCtx = splashCanvas.getContext('2d');
        const btnCanvas = document.getElementById('btnCanvas');
        const bCtx = btnCanvas.getContext('2d');

        function resize() {
            splashCanvas.width = window.innerWidth;
            splashCanvas.height = window.innerHeight;
            btnCanvas.width = 240;
            btnCanvas.height = 90;
        }
        window.addEventListener('resize', resize);
        resize();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSplatterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            
            const baseFreq = rageMeter > 50 ? 100 : 150;
            osc.frequency.setValueAtTime(baseFreq + Math.random() * 60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.15);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        let rageMeter = 0;
        let currentHue = 0;
        let drops = [];
        const gravity = 0.6;

        let liquidLevel = 0.5;
        let targetLevel = 0.5;
        let wavePhase = 0;
        let sloshAngle = 0;
        let sloshVelocity = 0;
        const sloshK = 0.18;
        const sloshDamping = 0.82;

        function updatePhysics() {
            sCtx.clearRect(0, 0, splashCanvas.width, splashCanvas.height);
            bCtx.clearRect(0, 0, btnCanvas.width, btnCanvas.height);

            bCtx.save();
            bCtx.beginPath();
            bCtx.roundRect(0, 0, btnCanvas.width, btnCanvas.height, 45);
            bCtx.clip();

            let bgGrad = bCtx.createLinearGradient(0, 0, 0, btnCanvas.height);
            bgGrad.addColorStop(0, '#111827');
            bgGrad.addColorStop(1, '#030712');
            bCtx.fillStyle = bgGrad;
            bCtx.fillRect(0, 0, btnCanvas.width, btnCanvas.height);

            sloshVelocity += (0 - sloshAngle) * sloshK;
            sloshVelocity *= sloshDamping;
            sloshAngle += sloshVelocity;

            wavePhase += 0.12 + (rageMeter / 100) * 0.25;
            targetLevel = 0.45 + (rageMeter / 100) * 0.45;
            liquidLevel += (targetLevel - liquidLevel) * 0.1;

            const baseHeight = btnCanvas.height * (1 - liquidLevel);
            const ampBase = 3 + (rageMeter / 100) * 16;

            bCtx.fillStyle = `hsl(${currentHue}, 90%, 25%)`;
            bCtx.beginPath();
            bCtx.moveTo(0, btnCanvas.height);
            for (let x = 0; x <= btnCanvas.width; x++) {
                const sloshOffset = (x - btnCanvas.width / 2) * Math.sin(sloshAngle * 0.9);
                const w1 = Math.sin((x * 0.035) - wavePhase * 0.8) * (ampBase * 0.8);
                const w2 = Math.cos((x * 0.07) + wavePhase * 1.1) * (ampBase * 0.4);
                const y = baseHeight + sloshOffset + w1 + w2 + 4;
                bCtx.lineTo(x, y);
            }
            bCtx.lineTo(btnCanvas.width, btnCanvas.height);
            bCtx.closePath();
            bCtx.fill();

            let liqGrad = bCtx.createLinearGradient(0, baseHeight - 20, 0, btnCanvas.height);
            liqGrad.addColorStop(0, `hsl(${currentHue}, 100%, 65%)`);
            liqGrad.addColorStop(0.3, `hsl(${currentHue}, 100%, 50%)`);
            liqGrad.addColorStop(1, `hsl(${currentHue}, 100%, 20%)`);
            bCtx.fillStyle = liqGrad;

            bCtx.beginPath();
            bCtx.moveTo(0, btnCanvas.height);
            for (let x = 0; x <= btnCanvas.width; x++) {
                const sloshOffset = (x - btnCanvas.width / 2) * Math.sin(sloshAngle);
                const w1 = Math.sin((x * 0.045) + wavePhase) * ampBase;
                const w2 = Math.cos((x * 0.09) - wavePhase * 1.4) * (ampBase * 0.5);
                const w3 = Math.sin((x * 0.25) + wavePhase * 3.0) * (1 + (rageMeter / 100) * 4);
                const y = baseHeight + sloshOffset + w1 + w2 + w3;
                bCtx.lineTo(x, y);
            }
            bCtx.lineTo(btnCanvas.width, btnCanvas.height);
            bCtx.closePath();
            bCtx.fill();

            let glassGrad = bCtx.createLinearGradient(0, 0, 0, btnCanvas.height);
            glassGrad.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
            glassGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.02)');
            glassGrad.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
            bCtx.fillStyle = glassGrad;
            bCtx.fillRect(0, 0, btnCanvas.width, btnCanvas.height);

            bCtx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            bCtx.lineWidth = 4;
            bCtx.strokeRect(0, 0, btnCanvas.width, btnCanvas.height);

            bCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            bCtx.font = '900 28px sans-serif';
            bCtx.textAlign = 'center';
            bCtx.textBaseline = 'middle';
            bCtx.fillText('RAGE!', btnCanvas.width / 2 + 1, btnCanvas.height / 2 + 2);

            bCtx.fillStyle = 'white';
            bCtx.fillText('RAGE!', btnCanvas.width / 2, btnCanvas.height / 2);
            bCtx.restore();

            if (drops.length > 0) {
                const splashColor = `hsl(${currentHue}, 100%, 55%)`;
                sCtx.fillStyle = splashColor;
                drops = drops.filter(drop => {
                    drop.x += drop.vx;
                    drop.y += drop.vy;
                    drop.vy += gravity;
                    drop.size *= 0.96;

                    sCtx.beginPath();
                    sCtx.arc(drop.x, drop.y, drop.size, 0, Math.PI * 2);
                    sCtx.fill();

                    if (drop.size < 6 || drop.y > splashCanvas.height) {
                        return false;
                    }
                    return true;
                });
            }

            requestAnimationFrame(updatePhysics);
        }
        updatePhysics();

        function handleClick(e) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            playSplatterSound();
            const vibeLevel = rageMeter > 50 ? [50, 15, 50] : 25;
            if (navigator.vibrate) navigator.vibrate(vibeLevel);

            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');
