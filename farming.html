        cosRegistry.body.b1.img.src = 'p1.png'; cosRegistry.body.b2.img.src = 'p2.png'; cosRegistry.body.b3.img.src = 'p3.png'; cosRegistry.body.b4.img.src = 'p4.png';
        cosRegistry.hats.h1.img.src = 'h1.png'; cosRegistry.hats.h2.img.src = 'h2.png'; cosRegistry.hats.h3.img.src = 'h3.png';

        cosRegistry.acc.a1.img.src = 'a1.png'; cosRegistry.acc.a2.img.src = 'a2.png'; cosRegistry.acc.a3.img.src = 'a3.png';
        
        const imgSoil = new Image(); imgSoil.src = 'd.png';
        const cropImages = {}; Object.keys(cropTypes).forEach(k => { let id = cropTypes[k].id; cropImages[k] = { sprout: new Image(), grown: new Image() }; cropImages[k].sprout.src = `s${id}.png`; cropImages[k].grown.src = `c${id}.png`; });
        const rows = 3, cols = 2; let plots = []; for (let r = 0; r < rows; r++) { for (let c = 0; c < cols; c++) plots.push({ row: r, col: c, status: 'empty', cropType: null, progress: 0, sprinkleTriggered: false, isShiny: false }); }
        let cellSize = 0, gridWidth = 0, gridHeight = 0, startX = 0, startY = 0, levelUpFlashTimer = 0, particles = [], floatingTexts = [];

        function resizeCanvas() { const rect = canvas.getBoundingClientRect(); canvas.width = rect.width; canvas.height = rect.height; cellSize = Math.min((rect.width * 0.85) / cols, (rect.height * 0.85) / rows); gridWidth = cellSize * cols; gridHeight = cellSize * rows; startX = (rect.width - gridWidth) / 2; startY = (rect.height - gridHeight) / 2; }
        function spawnParticles(x, y, color, count, type='star') {

        function updateGame() {
            if (joystick.active) { player.x += joystick.vx * player.speed; player.y += joystick.vy * player.speed; if (joystick.vx !== 0) player.faceDir = joystick.vx > 0 ? 1 : -1; if (player.x < 15) player.x = 15; if (player.x > canvas.width - 15) player.x = canvas.width - 15; if (player.y < 15) player.y = 15; if (player.y > canvas.height - 15) player.y = canvas.height - 15; }
            plots.forEach(p => { if (p.status === 'planted' && p.cropType) { p.progress += cropTypes[p.cropType].growthSpeed; if (p.progress >= 100) { p.progress = 100; p.status = 'grown'; if (!p.sprinkleTriggered) { let cx = startX + p.col * cellSize + cellSize / 2, cy = startY + p.row * cellSize + cellSize / 2; spawnParticles(cx, cy, p.isShiny ? '#ffd166' : cropTypes[p.cropType].color, 14, 'star'); p.sprinkleTriggered = true; } } } });

            if (levelUpFlashTimer > 0) levelUpFlashTimer--;
        }
        function drawCharacterLayer(cContext, cx, cy, size, flip) {
            cContext.save(); cContext.translate(cx, cy); cContext.scale(flip, 1);
            let bObj = cosRegistry.body[eqItems.body];

                    }

        }

            plots.forEach(plot => {

                if (plot.status === 'planted' && plot.cropType) {

                    ctx.fillStyle = cropTypes[plot.cropType].color; ctx.beginPath(); ctx.roundRect(cx - bw/2, py + cellSize - pad - 16, bw * (plot.progress / 100), bh, 5); ctx.fill();
                } else if (plot.status === 'grown' && plot.cropType) {

        function handleGridInteraction(clickX, clickY) {

                if (clickX >= px + pad && clickX <= px + cellSize - pad && clickY >= py + pad && clickY <= py + cellSize - pad) {
                    let cx = px + cellSize / 2, cy = py + cellSize / 2; if (Math.hypot(cx - player.x, cy - player.y) > cellSize * 1.15) { spawnFloatingText(player.x, player.y - 25, "Too Far! ✨", "#ff7096"); return; }
                    if (p.status === 'grown') {
                        let d = cropTypes[p.cropType], m = p.isShiny ? 3 : 1, fc = d.revenue * m, fe = d.expReward * m;
                        if (p.isShiny) stats.shinyHarvested++; spawnParticles(cx, cy - 10, '#ffd166', 15); spawnFloatingText(cx, cy - 15, `+💰${fc}`, '#f4a261');
                        coins += fc; stats.totalCoinsEarned += fc; addExperience(fe); p.status = 'empty'; p.cropType = null; p.isShiny = false; checkAchievements(); updateHUD(); return;
                    } else if (p.status === 'empty' && seeds > 0) {
                        if (currentLevel >= cropTypes[selectedCropType].unlockLv) {
                            p.status = 'planted'; p.cropType = selectedCropType; p.progress = 0; p.isShiny = Math.random() < cropTypes[selectedCropType].shinyChance;
                            if (selectedCropType === 'carrot') stats.carrotPlanted++; seeds--; checkAchievements(); updateHUD(); return;
                        }
                    }
                }
            }
        }
        function addExperience(a) { currentExp += a; if (currentExp >= expNeeded) { currentExp -= expNeeded; currentLevel++; levelUpFlashTimer = 45; checkUnlocks(); } updateHUD(); }
        function checkUnlocks() { Object.keys(cropTypes).forEach(k => { let b = document.getElementById(`btn-${k}`); if (b) { if (currentLevel >= cropTypes[k].unlockLv) b.classList.remove('locked'); else b.classList.add('locked'); } }); rebuildBook(); }
        function checkAchievements() { Object.keys(achievements).forEach(k => { let a = achievements[k]; if (!a.unlocked && stats[a.type] >= a.target) { a.unlocked = true; spawnFloatingText(player.x, player.y - 45, `🏆 Unlocked: ${a.title}!`, '#4f46e5'); } }); rebuildBook(); }
        function selectCrop(t) { if (currentLevel >= cropTypes[t].unlockLv) { selectedCropType = t; Object.keys(cropTypes).forEach(k => { let b = document.getElementById(`btn-${k}`); if (b) b.classList.remove('active'); }); document.getElementById(`btn-${t}`).classList.add('active'); } }
        function buySeeds() { if (coins >= 10) { coins -= 10; seeds += 1; updateHUD(); } }
        function updateHUD() { document.getElementById('coinCount').innerText = coins; document.getElementById('seedCount').innerText = seeds; document.getElementById('levelNum').innerText = currentLevel; document.getElementById('expBarFill').style.width = `${(currentExp / expNeeded) * 100}%`; let c = cosRegistry.body[eqItems.body]; document.getElementById('outfitIcon').innerText = c?c.icon:'🧑‍🌾'; }
        function rebuildBook() {
            let h = ""; Object.keys(cropTypes).forEach(k => { let l = currentLevel < cropTypes[k].unlockLv; h += `<div class="book-row"><span>${l ? '🔒' : cropTypes[k].icon} <b>${cropTypes[k].name}</b></span><span style="font-size:11px; color:#94a3b8">${l ? 'Unlock LV.' + cropTypes[k].unlockLv : cropTypes[k].feat}</span></div>`; }); document.getElementById('bookList').innerHTML = h;
            let ah = ""; Object.keys(achievements).forEach(k => { let a = achievements[k], cur = Math.min(a.target, stats[a.type]); ah += `<div class="book-row" style="flex-direction:column; align-items:flex-start; gap:2px;"><div>${a.unlocked?'✅':'🏆'} <b>${a.title}</b> (${cur}/${a.target})</div><div style="font-size:11px; color:#ff7096;">🎁 ${a.rwd}</div></div>`; }); document.getElementById('achList').innerHTML = ah;
        }
        function openDressingRoom() { document.getElementById('dressingRoomPage').style.display = 'flex'; document.getElementById('cosHintBox').innerText = "Select an item"; switchTab(currentTab); drawPreview(); }
        function closeDressingRoom() { document.getElementById('dressingRoomPage').style.display = 'none'; updateHUD(); }
        function drawPreview() { pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height); drawCharacterLayer(pCtx, pCanvas.width/2, pCanvas.height/2 + 10, 42, 1); }
        function switchTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(`tab-${t}`).classList.add('active'); rebuildClosetGrid(); }
        function rebuildClosetGrid() {
            let h = `<div class="item-grid">`; Object.keys(cosRegistry[currentTab]).forEach(k => {
                let item = cosRegistry[currentTab][k];
                let isL = (item.lv && currentLevel < item.lv) || (item.ach && !achievements[item.ach].unlocked);
                h += `<div class="cos-card ${isL?'locked':''} ${eqItems[currentTab]===item.id?'active':''}" onclick="clickItem('${currentTab}','${item.id}',${isL})"><div style="font-size:22px;">${isL?'🔒':item.icon}</div><div style="font-size:10px;">${item.title}</div></div>`;
            }); h += `</div>`; document.getElementById('closetGridContainer').innerHTML = h;
        }
        function clickItem(cat, id, isLocked) {
            let item = cosRegistry[cat][id]; let msg = "Default Item";
            if (item.lv) msg = `Unlock: Reach Level ${item.lv}`;
            else if (item.ach) { let a = achievements[item.ach]; msg = `Unlock: Complete [${a.title}]`; }
            document.getElementById('cosHintBox').innerText = msg;
            if (isLocked) return; eqItems[cat] = id; rebuildClosetGrid(); drawPreview();
        }
        function toggleModal(id) { let e = document.getElementById(id); e.style.display = (e.style.display === 'flex' || e.style.display === 'block') ? 'none' : 'flex'; if(e.style.display==='flex') rebuildBook(); }

        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            if(document.getElementById('menuModal').style.display === 'flex' || document.getElementById('dressingRoomPage').style.display === 'flex') return;
            const rect = canvas.getBoundingClientRect();
            let t = e.changedTouches[0];
            let tx = (t.clientX - rect.left) * (canvas.width / rect.width);
            let ty = (t.clientY - rect.top) * (canvas.height / rect.height);
            touchStartX = t.clientX; touchStartY = t.clientY;
            let jSize = 65 * (rect.width / canvas.width);
            let isInsideJ = Math.hypot(t.clientX - (rect.left + 60 * (rect.width/canvas.width)), t.clientY - (rect.top + (canvas.height - 60) * (rect.height/canvas.height))) < jSize;
            if (isInsideJ && !joystick.active) {
                joystick.active = true; joystick.touchId = t.identifier; joystick.startX = 60; joystick.startY = canvas.height - 60; joystick.curX = tx; joystick.curY = ty;
                e.preventDefault();
            }
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            for (let i = 0; i < e.touches.length; i++) {
                let t = e.touches[i]; if (t.identifier === joystick.touchId) {
                    let mx = (t.clientX - rect.left) * (canvas.width / rect.width), my = (t.clientY - rect.top) * (canvas.height / rect.height);
                    let dx = mx - joystick.startX, dy = my - joystick.startY, dist = Math.hypot(dx, dy);
                    if (dist > joystick.maxRadius) { mx = joystick.startX + (dx / dist) * joystick.maxRadius; my = joystick.startY + (dy / dist) * joystick.maxRadius; }
                    joystick.curX = mx; joystick.curY = my; joystick.vx = dx / joystick.maxRadius; joystick.vy = dy / joystick.maxRadius;
                }
            }
        }, { passive: true });
        window.addEventListener('touchend', (e) => {
            if (joystick.active) {
                let t = e.changedTouches[0]; if (t.identifier === joystick.touchId) { joystick.active = false; joystick.vx = 0; joystick.vy = 0; joystick.touchId = null; }
            } else {
                if(document.getElementById('menuModal').style.display === 'flex' || document.getElementById('dressingRoomPage').style.display === 'flex') return;
                let t = e.changedTouches[0]; const rect = canvas.getBoundingClientRect();
                if (t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) {
                    if (Math.hypot(t.clientX - touchStartX, t.clientY - touchStartY) < 15) {
                        let tx = (t.clientX - rect.left) * (canvas.width / rect.width);
                        let ty = (t.clientY - rect.top) * (canvas.height / rect.height);
                        handleGridInteraction(tx, ty);
                    }
                }
            }
        });
        window.addEventListener('mousedown', (e) => { if ('ontouchstart' in window) return; const rect = canvas.getBoundingClientRect(); handleGridInteraction((e.clientX - rect.left) * (canvas.width / rect.width), (e.clientY - rect.top) * (canvas.height / rect.height)); });
        setTimeout(() => { resizeCanvas(); rebuildBook(); }, 120); window.addEventListener('resize', resizeCanvas);
        checkUnlocks(); updateHUD(); gameLoop();
    </script></body></html>
