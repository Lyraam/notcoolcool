<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Farming Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fce7f3; /* Cute pastel pink background */
            background-image: radial-gradient(#fbcfe8 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            color: #1e293b;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Top HUD Header Dashboard */
        #gameHeader {
            width: 100%;
            max-width: 440px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .stats-group {
            display: flex;
            gap: 8px;
        }

        .stat-box {
            background: #ffffff;
            border: 3.5px solid #1e293b;
            border-radius: 14px;
            padding: 6px 14px;
            font-weight: 800;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 0 #1e293b;
        }

        /* Floating Shop Button placed safely at top-right */
        .shop-btn {
            background: #ffb703;
            border: 3.5px solid #1e293b;
            border-radius: 14px;
            padding: 6px 12px;
            font-weight: 800;
            font-size: 14px;
            color: #1e293b;
            cursor: pointer;
            box-shadow: 0 4px 0 #1e293b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .shop-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1e293b;
        }

        /* Main Game Canvas Viewport Frame */
        #canvasContainer {
            position: relative;
            width: 100%;
            max-width: 440px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        canvas {
            background-color: #ffedd5; /* Warm light sand color for the farm ground */
            border: 4px solid #1e293b;
            border-radius: 24px;
            box-shadow: 0 8px 0 #1e293b;
            display: block;
        }
    </style>
</head>
<body>

    <div id="gameHeader">
        <div class="stats-group">
            <div class="stat-box" style="color: #d97706;">💰 <span id="coinCount">100</span></div>
            <div class="stat-box" style="color: #059669;">🌱 <span id="seedCount">5</span></div>
        </div>
        <button class="shop-btn" onclick="buySeeds()">🛒 Buy Seed (-10💰)</button>
    </div>

    <div id="canvasContainer">
        <canvas id="farmCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('farmCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        let coins = 100;
        let seeds = 5;

        // --- ART ASSETS DIRECTORY LOADING CODE ---
        // To use your own drawings, place your image files in the same folder as this HTML file!
        // If an image file is missing, the game will automatically draw fallback shapes so it never breaks.
        
        const imgSoil = new Image();
        imgSoil.src = 'dirt.png';       // Your drawing for empty land tile texture

        const imgSeedling = new Image();
        imgSeedling.src = 'sprout.png'; // Your drawing for young growing sprout asset

        const imgGrown = new Image();
        imgGrown.src = 'berry.png';     // Your drawing for fully matured cute crop asset

        // Grid parameters configurations
        const rows = 3;
        const cols = 2;
        let plots = [];

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                plots.push({
                    row: r, col: c,
                    status: 'empty',
                    progress: 0,
                    growthSpeed: 0.4
                });
            }
        }

        let cellSize = 0;
        let gridWidth = 0;
        let gridHeight = 0;
        let startX = 0;
        let startY = 0;

        function resizeCanvas() {
            const width = container.clientWidth - 20;
            const height = container.clientHeight - 20;
            canvas.width = width;
            canvas.height = height;

            cellSize = Math.min((width * 0.85) / cols, (height * 0.85) / rows);
            gridWidth = cellSize * cols;
            gridHeight = cellSize * rows;
            startX = (width - gridWidth) / 2;
            startY = (height - gridHeight) / 2;
        }

        function updateGame() {
            plots.forEach(plot => {
                if (plot.status === 'planted') {
                    plot.progress += plot.growthSpeed;
                    if (plot.progress >= 100) {
                        plot.progress = 100;
                        plot.status = 'grown';
                    }
                }
            });
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            plots.forEach(plot => {
                let px = startX + plot.col * cellSize;
                let py = startY + plot.row * cellSize;
                let pad = 12;
                let w = cellSize - pad * 2;
                let h = cellSize - pad * 2;

                // 1. Draw Ground Base Layouts
                ctx.lineWidth = 3.5;
                ctx.strokeStyle = '#1e293b';
                
                if (plot.status === 'empty') ctx.fillStyle = '#b45309';
                else if (plot.status === 'planted') ctx.fillStyle = '#78350f';
                else if (plot.status === 'grown') ctx.fillStyle = '#451a03';

                ctx.beginPath();
                ctx.roundRect(px + pad, py + pad, w, h, 20);
                ctx.fill();
                ctx.stroke();

                // Check if your own custom soil asset image is successfully loaded
                if (imgSoil.complete && imgSoil.naturalWidth !== 0) {
                    ctx.drawImage(imgSoil, px + pad, py + pad, w, h);
                }

                // Center position helpers for drawings rendering inside slots
                let cx = px + cellSize / 2;
                let cy = py + cellSize / 2;

                // 2. Render Crop Art Asset States
                if (plot.status === 'planted') {
                    let currentScale = 0.4 + (plot.progress / 100) * 0.4; // smooth expansion scale
                    let assetW = w * currentScale;
                    let assetH = h * currentScale;

                    if (imgSeedling.complete && imgSeedling.naturalWidth !== 0) {
                        ctx.drawImage(imgSeedling, cx - assetW/2, cy - assetH/2, assetW, assetH);
                    } else {
                        // Cute default backup sprout fallback shape
                        ctx.fillStyle = '#10b981';
                        ctx.beginPath();
                        ctx.arc(cx, cy + 5, 12 * currentScale, Math.PI, 0);
                        ctx.fill();
                    }
                    
                    // Cute Progress loading bar styling design
                    let barW = w * 0.7;
                    let barH = 8;
                    ctx.fillStyle = '#1e293b';
                    ctx.beginPath();
                    ctx.roundRect(cx - barW/2, py + cellSize - pad - 16, barW, barH, 4);
                    ctx.fill();

                    ctx.fillStyle = '#f43f5e'; // lovely pink progress fill color
                    ctx.beginPath();
                    ctx.roundRect(cx - barW/2, py + cellSize - pad - 16, barW * (plot.progress / 100), barH, 4);
                    ctx.fill();

                } else if (plot.status === 'grown') {
                    let pulse = Math.sin(Date.now() * 0.006) * 3;
                    let assetW = w * 0.85 + pulse;
                    let assetH = h * 0.85 + pulse;

                    if (imgGrown.complete && imgGrown.naturalWidth !== 0) {
                        ctx.drawImage(imgGrown, cx - assetW/2, cy - assetH/2, assetW, assetH);
                    } else {
                        // Cute default backup fully grown flower icon
                        ctx.fillStyle = '#ec4899';
                        ctx.beginPath();
                        ctx.arc(cx, cy, 18, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fde047';
                        ctx.beginPath();
                        ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }

        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function handleTap(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            let clickX = clientX - rect.left;
            let clickY = clientY - rect.top;

            plots.forEach(plot => {
                let px = startX + plot.col * cellSize;
                let py = startY + plot.row * cellSize;
                let pad = 12;

                if (clickX >= px + pad && clickX <= px + cellSize - pad &&
                    clickY >= py + pad && clickY <= py + cellSize - pad) {
                    
                    if (plot.status === 'empty' && seeds > 0) {
                        plot.status = 'planted';
                        plot.progress = 0;
                        seeds--;
                        document.getElementById('seedCount').innerText = seeds;
                    } else if (plot.status === 'grown') {
                        plot.status = 'empty';
                        coins += 25;
                        document.getElementById('coinCount').innerText = coins;
                    }
                }
            });
        }

        function buySeeds() {
            if (coins >= 10) {
                coins -= 10;
                seeds += 1;
                document.getElementById('coinCount').innerText = coins;
                document.getElementById('seedCount').innerText = seeds;
            }
        }

        window.addEventListener('touchstart', (e) => {
            if(e.touches[0]) handleTap(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        window.addEventListener('mousedown', (e) => {
            handleTap(e.clientX, e.clientY);
        });

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
        gameLoop();
    </script>
</body>
</html>
