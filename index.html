<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Interactive Projects Hub</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #0b1329;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 24px;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        p {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 48px;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .item-info {
            text-align: left;
        }

        .item-title {
            color: #f8fafc;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .item-desc {
            color: #64748b;
            font-size: 14px;
        }

        .item-arrow {
            color: #3b82f6;
            font-size: 20px;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        .menu-item:active .item-arrow {
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PROJECTS</h1>
        <p>Select an interactive lab to launch</p>

        <div class="menu-list">
            <a href="project1.html" class="menu-item">
                <div class="item-info">
                    <div class="item-title">Project 1</div>
                    <div class="item-desc">My very first canvas experiment</div>
                </div>
                <div class="item-arrow">&rarr;</div>
            </a>

            <a href="liquid.html" class="menu-item">
                <div class="item-info">
                    <div class="item-title">Liquid Splash Machine</div>
                    <div class="item-desc">Matter.js physics 2D fluid simulation</div>
                </div>
                <div class="item-arrow">&rarr;</div>
            <a href="cloth.html" class="menu-item">
    <div class="item-info">
        <div class="item-title">Project 3: Tearable Cloth</div>
        <div class="item-desc">2D Verlet integration ragdoll fabric physics</div>
    </div>
    <div class="item-arrow">&rarr;</div>
            </a>
        </div>
    </div>

</body>
</html>
