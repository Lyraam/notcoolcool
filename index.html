<!DOCTYPE html>
<html>
<head>
    <title>Satisfying Button Website</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            font-family: sans-serif;
            overflow: hidden;
        }

        .satisfying-btn {
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45cafc, #ff6b6b);
            background-size: 300% 300%;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            animation: gradient-move 4s ease infinite;
            position: relative;
            z-index: 10;
        }

        .satisfying-btn:active {
            transform: scale(0.92);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.2);
        }

        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <button class="satisfying-btn" onclick="createParticles(event)">Click to Release Stress</button>

    <script>
        function createParticles(e) {
            const btn = e.target;
            const rect = btn.getBoundingClientRect();
            const x = e.clientX || (rect.left + rect.width / 2);
            const y = e.clientY || (rect.top + rect.height / 2);

            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 12 + 6;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                const colors = ['#ff6b6b', '#4ecdc4', '#45cafc', '#ffd166', '#a01a58'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.left = `${x - size / 2}px`;
                particle.style.top = `${y - size / 2}px`;
                
                const destinationX = (Math.random() - 0.5) * 300;
                const destinationY = (Math.random() - 0.5) * 300;
                
                particle.style.setProperty('--x', `${destinationX}px`);
                particle.style.setProperty('--y', `${destinationY}px`);
                
                document.body.appendChild(particle);
                
                particle.addEventListener('animationend', () => {
                    particle.remove();
                });
            }
        }
    </script>

</body>
</html>
