<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massive Satisfying Machine</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050b14;
            font-family: sans-serif;
            overflow: hidden;
            transition: background-color 0.1s ease;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }

        body.shake {
            animation: screen-shake 0.15s ease-in-out;
        }

        .satisfying-btn {
            padding: 25px 50px;
            font-size: 24px;
            font-weight: 900;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff0055, #00ffcc, #9900ff, #ff0055);
            background-size: 300% 300%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
            transition: transform 0.05s ease;
            animation: gradient-move 2s linear infinite;
            position: relative;
            z-index: 10;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .satisfying-btn:active {
            transform: scale(0.85);
        }

        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(5px, 5px); }
            100% { transform: translate(0, 0); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: explode 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0);
                opacity: 0;
            }
        }

        .shockwave {
            position: absolute;
            border: 4px solid #00ffcc;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: wave 0.4s ease-out forwards;
        }

        @keyframes wave {
            0% {
                width: 100px;
                height: 100px;
                opacity: 1;
                transform: scale(0.5);
                box-shadow: 0 0 20px #00ffcc;
            }
            100% {
                width: 500px;
                height: 500px;
                opacity: 0;
                transform: scale(1.5);
                box-shadow: 0 0 50px #ff0055;
            }
        }
    </style>
</head>
<body>

    <button class="satisfying-btn" onclick="handleClick(event)">BOOM!</button>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playExplosionSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150 + Math.random() * 100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function handleClick(e) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            playExplosionSound();

            if (navigator.vibrate) {
                navigator.vibrate([40, 20, 40]);
            }

            document.body.classList.remove('shake');
            void document.body.offsetWidth; 
            document.body.classList.add('shake');

            const originalBg = document.body.style.backgroundColor;
            document.body.style.backgroundColor = '#1e293b';
            setTimeout(() => { document.body.style.backgroundColor = '#050b14'; }, 50);

            const btn = e.target;
            const rect = btn.getBoundingClientRect();
            const x = e.clientX || (rect.left + rect.width / 2);
            const y = e.clientY || (rect.top + rect.height / 2);

            const wave = document.createElement('div');
            wave.classList.add('shockwave');
            wave.style.left = `${x - 50}px`;
            wave.style.top = `${y - 50}px`;
            document.body.appendChild(wave);
            wave.addEventListener('animationend', () => wave.remove());

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 20 + 8;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                const shapes = ['50%', '0%', '20%'];
                particle.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                
                const colors = ['#ff0055', '#00ffcc', '#9900ff', '#ffcc00', '#ff5500', '#ffffff'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.left = `${x - size / 2}px`;
                particle.style.top = `${y - size / 2}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 500 + 200;
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity;
                const rotation = Math.random() * 720 - 360;
                
                particle.style.setProperty('--x', `${destinationX}px`);
                particle.style.setProperty('--y', `${destinationY}px`);
                particle.style.setProperty('--r', `${rotation}deg`);
                
                document.body.appendChild(particle);
                
                particle.addEventListener('animationend', () => {
                    particle.remove();
                });
            }
        }
    </script>

</body>
</html>
