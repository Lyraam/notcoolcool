<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jelly Eat Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        window.addEventListener('scroll', e => e.preventDefault(), { passive: false });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        let score = 0;
        let baseRadius = 55;
        let targetRadius = 55;
        
        let food = { x: width / 2, y: height / 3, radius: 10, pulse: 0 };
        let mouse = { x: width / 2, y: height / 2, isDown: false };

        let layer1 = { x: width / 2, y: height / 2, vx: 0, vy: 0 }; 
        let layer2 = { x: width / 2, y: height / 2, vx: 0, vy: 0 }; 
        let layer3 = { x: width / 2, y: height / 2, vx: 0, vy: 0 }; 

        let targetX = width / 2;
        let targetY = height / 2;
        let bounceTimer = 0;

        function spawnFood() {
            food.x = 60 + Math.random() * (width - 120);
            food.y = 100 + Math.random() * (height - 200);
        }

        function updateGame() {
            baseRadius += (targetRadius - baseRadius) * 0.05;

            if (mouse.isDown) {
                targetX = mouse.x;
                targetY = mouse.y;
            } else {
                targetY += Math.sin(Date.now() * 0.002) * 0.4;
            }

            layer3.x += (targetX - layer3.x) * 0.22;
            layer3.y += (targetY - layer3.y) * 0.22;

            layer2.x += (layer3.x - layer2.x) * 0.14;
            layer2.y += (layer3.y - layer2.y) * 0.14;

            let prevX = layer1.x;
            let prevY = layer1.y;
            layer1.x += (layer2.x - layer1.x) * 0.08;
            layer1.y += (layer2.y - layer1.y) * 0.08;

            layer1.vx = layer1.x - prevX;
            layer1.vy = layer1.y - prevY;

            if (layer1.x < baseRadius) layer1.x = baseRadius;
            if (layer1.x > width - baseRadius) layer1.x = width - baseRadius;
            if (layer1.y < baseRadius) layer1.y = baseRadius;
            if (layer1.y > height - baseRadius) layer1.y = height - baseRadius;

            let fdx = layer1.x - food.x;
            let fdy = layer1.y - food.y;
            let fdist = Math.sqrt(fdx * fdx + fdy * fdy);
            
            if (fdist < baseRadius + 12) {
                score++;
                targetRadius = Math.min(baseRadius + 5, 110); 
                bounceTimer = 25; 
                spawnFood();
            }

            if (bounceTimer > 0) bounceTimer--;
            food.pulse += 0.07;
        }

        function drawJellyLayer(centerX, centerY, r, stretchX, stretchY, angle, fillStyle, strokeStyle, lineWidth) {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle);
            ctx.scale(stretchX, stretchY);
            
            ctx.fillStyle = fillStyle;
            if (strokeStyle) {
                ctx.strokeStyle = strokeStyle;
                ctx.lineWidth = lineWidth / stretchX; 
            }

            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();
            if (strokeStyle) ctx.stroke();
            
            ctx.restore();
        }

        function drawGame() {
            ctx.clearRect(0, 0, width, height);

            let fRadius = food.radius + Math.sin(food.pulse) * 3;
            ctx.fillStyle = 'rgba(0, 255, 204, 0.25)';
            ctx.beginPath();
            ctx.arc(food.x, food.y, fRadius + 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(food.x, food.y, fRadius, 0, Math.PI * 2);
            ctx.fill();

            let speed = Math.sqrt(layer1.vx * layer1.vx + layer1.vy * layer1.vy);
            let angle = Math.atan2(layer1.vy, layer1.vx);

            let stretchX = 1 + Math.min(speed * 0.04, 0.65);
            let stretchY = 1 - Math.min(speed * 0.025, 0.35);

            if (bounceTimer > 0) {
                let wiggle = Math.sin(bounceTimer * 0.6) * (bounceTimer * 0.015);
                stretchX += wiggle;
                stretchY -= wiggle;
            }

            drawJellyLayer(
                layer1.x, layer1.y, baseRadius, 
                stretchX, stretchY, angle, 
                'rgba(255, 0, 128, 0.35)', '#ff0080', 4.5
            );

            drawJellyLayer(
                layer2.x, layer2.y, baseRadius * 0.7, 
                stretchX * 0.95, stretchY * 0.95, angle, 
                'rgba(255, 0, 128, 0.22)', null, 0
            );

            drawJellyLayer(
                layer3.x, layer3.y, baseRadius * 0.35, 
                1, 1, 0, 
                '#ff0080', null, 0
            );

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(layer3.x - baseRadius * 0.08, layer3.y - baseRadius * 0.08, baseRadius * 0.09, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText("SCORE: " + score, 25, 45);
        }

        function loop() {
            updateGame();
            drawGame();
            requestAnimationFrame(loop);
        }

        function setMouse(e) {
            let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            let clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            mouse.x = clientX;
            mouse.y = clientY;
        }

        window.addEventListener('mousedown', (e) => { mouse.isDown = true; setMouse(e); });
        window.addEventListener('mousemove', (e) => { setMouse(e); });
        window.addEventListener('mouseup', () => mouse.isDown = false);

        window.addEventListener('touchstart', (e) => { mouse.isDown = true; setMouse(e); }, { passive: true });
        window.addEventListener('touchmove', (e) => { setMouse(e); }, { passive: true });
        window.addEventListener('touchend', () => mouse.isDown = false);

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        });

        spawnFood();
        loop();
    </script>

</body>
</html>
