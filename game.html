<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jelly Eat Lab</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: #0b1329;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        window.addEventListener('scroll', e => e.preventDefault(), { passive: false });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        let score = 0;
        let jellyRadius = 50;
        let targetRadius = 50;
        
        let food = { x: width / 2, y: height / 3, radius: 10, pulse: 0 };
        let mouse = { x: 0, y: 0, isDown: false };

        class JellyPoint {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.px = x;
                this.py = y;
            }

            update() {
                let vx = (this.x - this.px) * 0.97;
                let vy = (this.y - this.py) * 0.97;

                this.px = this.x;
                this.py = this.y;

                this.x += vx;
                this.y += vy + 0.12; 

                if (this.y > height - 35) {
                    this.y = height - 35;
                    this.py = this.y + vy * 0.3;
                }
                if (this.y < 35) {
                    this.y = 35;
                    this.py = this.y + vy * 0.3;
                }
                if (this.x > width - 35) {
                    this.x = width - 35;
                    this.px = this.x + vx * 0.3;
                }
                if (this.x < 35) {
                    this.x = 35;
                    this.px = this.x + vx * 0.3;
                }
            }
        }

        class JellySpring {
            constructor(p1, p2, length) {
                this.p1 = p1;
                this.p2 = p2;
                this.length = length;
            }

            resolve() {
                let dx = this.p2.x - this.p1.x;
                let dy = this.p2.y - this.p1.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist === 0) return;

                let diff = (this.length - dist) / dist * 0.22;
                let offsetX = dx * diff;
                let offsetY = dy * diff;

                this.p1.x -= offsetX;
                this.p1.y -= offsetY;
                this.p2.x += offsetX;
                this.p2.y += offsetY;
            }
        }

        let points = [];
        let springs = [];
        let centerPoint = new JellyPoint(width / 2, height / 2);
        const numPoints = 14;

        function initJelly() {
            points = [];
            springs = [];
            
            centerPoint.x = width / 2;
            centerPoint.y = height / 2;
            centerPoint.px = width / 2;
            centerPoint.py = height / 2;

            for (let i = 0; i < numPoints; i++) {
                let angle = (i / numPoints) * Math.PI * 2;
                let rx = centerPoint.x + Math.cos(angle) * jellyRadius;
                let ry = centerPoint.y + Math.sin(angle) * jellyRadius;
                points.push(new JellyPoint(rx, ry));
            }

            for (let i = 0; i < numPoints; i++) {
                let next = (i + 1) % numPoints;
                springs.push(new JellySpring(points[i], points[next], jellyRadius * 0.45));
                springs.push(new JellySpring(points[i], centerPoint, jellyRadius));
                
                let cross = (i + Math.floor(numPoints / 2)) % numPoints;
                if (i < numPoints / 2) {
                    springs.push(new JellySpring(points[i], points[cross], jellyRadius * 2));
                }
            }
        }

        function spawnFood() {
            food.x = 60 + Math.random() * (width - 120);
            food.y = 100 + Math.random() * (height - 200);
        }

        function updateGame() {
            jellyRadius += (targetRadius - jellyRadius) * 0.08;
            
            springs.forEach(s => {
                if (s.p2 === centerPoint) {
                    s.length = jellyRadius;
                } else if (s.length > jellyRadius * 1.5) {
                    s.length = jellyRadius * 2;
                } else {
                    s.length = jellyRadius * 0.45;
                }
            });

            centerPoint.update();
            points.forEach(p => p.update());

            if (mouse.isDown) {
                points.forEach(p => {
                    let mdx = mouse.x - p.x;
                    let mdy = mouse.y - p.y;
                    let mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (mdist > 5) {
                        p.x += (mdx / mdist) * 1.4;
                        p.y += (mdy / mdist) * 1.4;
                    }
                });
                let cmdx = mouse.x - centerPoint.x;
                let cmdy = mouse.y - centerPoint.y;
                let cmdist = Math.sqrt(cmdx * cmdx + cmdy * cmdy);
                if (cmdist > 5) {
                    centerPoint.x += (cmdx / cmdist) * 1.2;
                    centerPoint.y += (cmdy / cmdist) * 1.2;
                }
            }

            for (let i = 0; i < 6; i++) {
                springs.forEach(s => s.resolve());
            }

            let fdx = centerPoint.x - food.x;
            let fdy = centerPoint.y - food.y;
            let fdist = Math.sqrt(fdx * fdx + fdy * fdy);
            
            if (fdist < jellyRadius + 15) {
                score++;
                targetRadius = Math.min(jellyRadius + 6, 120); 
                spawnFood();
                
                points.forEach(p => {
                    let pdx = p.x - centerPoint.x;
                    let pdy = p.y - centerPoint.y;
                    let pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                    if (pdist > 0) {
                        p.x += (pdx / pdist) * 35;
                        p.y += (pdy / pdist) * 35;
                    }
                });
            }

            food.pulse += 0.07;
        }

        function drawGame() {
            ctx.clearRect(0, 0, width, height);

            let fRadius = food.radius + Math.sin(food.pulse) * 3;
            ctx.fillStyle = 'rgba(0, 255, 204, 0.25)';
            ctx.beginPath();
            ctx.arc(food.x, food.y, fRadius + 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.arc(food.x, food.y, fRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 0, 128, 0.75)';
            ctx.strokeStyle = '#ff0080';
            ctx.lineWidth = 4.5;
            ctx.beginPath();

            let xc1 = (points[numPoints - 1].x + points[0].x) / 2;
            let yc1 = (points[numPoints - 1].y + points[0].y) / 2;
            ctx.moveTo(xc1, yc1);

            for (let i = 0; i < numPoints; i++)
